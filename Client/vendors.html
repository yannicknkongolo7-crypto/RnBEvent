<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK2C6GZWJZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DK2C6GZWJZ');
    </script>
    <title>Vendor Directory | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Vendor Directory</h1>
        </div>
    </div>

    <main class="container subpage-content" id="vendors-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        function initVendors() {
            var client   = window.currentClient;
            var codeHash = window.currentCode;
            var el       = document.getElementById('vendors-content');
            var items    = (client.vendors || []).map(function (v) {
                return { name: v.name || '', role: v.role || '', phone: v.phone || '', email: v.email || '', status: v.status || 'TBD' };
            });

            render();

            function doSave() {
                var ind = document.getElementById('vendors-autosave');
                if (ind) { ind.textContent = 'Saving\u2026'; ind.className = 'tracking-autosave saving'; }
                fetch(window.RNB_SECTION_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codeHash: codeHash, section: 'vendors', data: items, editLogEntry: { ts: new Date().toISOString(), role: window.currentRole || 'couple', roleName: window.currentRoleName || 'Client', action: 'Updated vendors' } })
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    var i = document.getElementById('vendors-autosave');
                    if (!i) return;
                    if (d && d.ok) { i.textContent = 'Saved \u2713'; i.className = 'tracking-autosave saved'; setTimeout(function() { var x = document.getElementById('vendors-autosave'); if (x) x.textContent = ''; }, 3000); }
                    else { i.textContent = '\u26a0 Save failed'; i.className = 'tracking-autosave error'; }
                })
                .catch(function() { var i = document.getElementById('vendors-autosave'); if (i) { i.textContent = '\u26a0 No connection'; i.className = 'tracking-autosave error'; } });
            }

            function render() {
                var html = '<div class="tracking-section-header" style="margin-bottom:16px"><span class="tracking-section-title" style="font-size:17px">Vendors</span><span id="vendors-autosave" class="tracking-autosave"></span></div>';
                if (items.length) {
                    html += '<div class="vendor-grid">';
                    items.forEach(function (v, i) {
                        var sc = (v.status || 'TBD').replace(/\s+/g, '');
                        html += '<div class="vendor-card">' +
                            '<p class="vendor-role">' + escHtml(v.role || '') + '</p>' +
                            '<h3 class="vendor-name">' + escHtml(v.name) + '</h3>' +
                            '<div class="vendor-contact">';
                        if (v.phone) html += '<div>&#9742; ' + escHtml(v.phone) + '</div>';
                        if (v.email) html += '<div>&#9993; ' + escHtml(v.email) + '</div>';
                        html += '</div>' +
                            '<span class="vendor-status-badge ' + sc + '">' + escHtml(v.status || 'TBD') + '</span>' +
                            '<button type="button" class="tracking-remove-btn vendor-remove" data-index="' + i + '" title="Remove">&times;</button>' +
                        '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="tracking-section tracking-editable" style="margin-top:30px">';
                html += '<h3 class="tracking-section-title" style="font-size:16px">Add Vendor</h3>';
                html += '<div class="edit-add-row">';
                html += '<input type="text" id="v-name" class="tracking-input" placeholder="Vendor name" maxlength="200">';
                html += '<input type="text" id="v-role" class="tracking-input" placeholder="Role (e.g. Florist)" maxlength="100">';
                html += '</div>';
                html += '<div class="edit-add-row">';
                html += '<input type="text" id="v-phone" class="tracking-input" placeholder="Phone" maxlength="30">';
                html += '<input type="email" id="v-email" class="tracking-input" placeholder="Email" maxlength="200">';
                html += '<input type="text" id="v-status" class="tracking-input" placeholder="Status (e.g. Confirmed)" maxlength="50">';
                html += '<button type="button" id="add-btn" class="tracking-add-btn">+ ADD</button>';
                html += '</div>';
                html += '</div>';
                el.innerHTML = html;

                el.querySelectorAll('.vendor-remove').forEach(function (btn) {
                    btn.addEventListener('click', function () { items.splice(parseInt(this.dataset.index), 1); render(); doSave(); });
                });
                document.getElementById('add-btn').addEventListener('click', addVendor);
                document.getElementById('v-name').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); addVendor(); }
                });
            }

            function addVendor() {
                var n = document.getElementById('v-name').value.trim();
                if (!n) return;
                items.push({ name: n, role: document.getElementById('v-role').value.trim(), phone: document.getElementById('v-phone').value.trim(), email: document.getElementById('v-email').value.trim(), status: document.getElementById('v-status').value.trim() || 'TBD' });
                render();
                doSave();
            }
        }
        if (window._portalReady) { initVendors(); } else { window.onPortalReady = initVendors; }
    </script>
</body>
</html>
