<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK2C6GZWJZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DK2C6GZWJZ');
    </script>
    <title>Mood Board | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Your Mood Board</h1>
        </div>
    </div>

    <main class="container subpage-content" id="moodboard-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        function initMoodboard() {
            var client = window.currentClient;
            var el     = document.getElementById('moodboard-content');
            var mb     = JSON.parse(JSON.stringify(client.moodboard || { palette: [], images: [], description: '' }));
            if (!mb.palette) mb.palette = [];
            if (!mb.images)  mb.images  = [];

            render();

            function render() {
                var html = '';
                /* Description */
                html += '<div class="tracking-section tracking-editable">';
                html += '<h2 class="tracking-section-title">Description</h2>';
                html += '<textarea id="mb-desc" class="tracking-input" style="width:100%;min-height:80px">' + escHtml(mb.description || '') + '</textarea>';
                html += '</div>';

                /* Colour palette */
                html += '<div class="tracking-section tracking-editable">';
                html += '<h2 class="tracking-section-title">Colour Palette</h2>';
                if (mb.palette.length) {
                    html += '<div class="palette-row" style="margin-bottom:16px">';
                    mb.palette.forEach(function (hex, i) {
                        html += '<div class="palette-swatch-edit">' +
                            '<div class="palette-swatch" style="background:' + escHtml(hex) + ';" title="' + escHtml(hex) + '"></div>' +
                            '<button type="button" class="tracking-remove-btn palette-remove" data-index="' + i + '">&times;</button>' +
                        '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="edit-add-row">';
                html += '<input type="color" id="new-color" class="color-picker" value="#b89a5e">';
                html += '<input type="text" id="new-hex" class="tracking-input" placeholder="#b89a5e" maxlength="10" style="max-width:140px">';
                html += '<button type="button" id="add-color-btn" class="tracking-add-btn">+ ADD</button>';
                html += '</div>';
                html += '</div>';

                /* Images */
                html += '<div class="tracking-section tracking-editable">';
                html += '<h2 class="tracking-section-title">Visual Direction</h2>';
                if (mb.images.length) {
                    html += '<div class="moodboard-grid" style="margin-bottom:16px">';
                    mb.images.forEach(function (img, i) {
                        var src = typeof img === 'string' ? img : (img.url || '');
                        var cap = typeof img === 'object' ? (img.caption || '') : '';
                        html += '<div class="gallery-item-edit">' +
                            '<img src="' + escHtml(src) + '" class="moodboard-img" loading="lazy">' +
                            (cap ? '<p class="gallery-caption">' + escHtml(cap) + '</p>' : '') +
                            '<button type="button" class="tracking-remove-btn gallery-remove" data-index="' + i + '">&times;</button>' +
                        '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="edit-add-row">';
                html += '<input type="text" id="new-img-url" class="tracking-input" placeholder="Image URL (https://...)" maxlength="2000">';
                html += '<input type="text" id="new-img-cap" class="tracking-input" placeholder="Caption (optional)" maxlength="300">';
                html += '<button type="button" id="add-img-btn" class="tracking-add-btn">+ ADD</button>';
                html += '</div>';
                html += '</div>';

                html += '<button type="button" id="save-btn" class="tracking-save-btn">SAVE CHANGES</button>';
                html += '<p id="save-status" class="tracking-save-status"></p>';

                el.innerHTML = html;

                /* Sync color picker ↔ text */
                var cp = document.getElementById('new-color');
                var hx = document.getElementById('new-hex');
                cp.addEventListener('input', function () { hx.value = cp.value; });
                hx.addEventListener('input', function () { if (/^#[0-9a-f]{6}$/i.test(hx.value)) cp.value = hx.value; });

                el.querySelectorAll('.palette-remove').forEach(function (btn) {
                    btn.addEventListener('click', function () { mb.palette.splice(parseInt(this.dataset.index), 1); render(); });
                });
                el.querySelectorAll('.gallery-remove').forEach(function (btn) {
                    btn.addEventListener('click', function () { mb.images.splice(parseInt(this.dataset.index), 1); render(); });
                });
                document.getElementById('add-color-btn').addEventListener('click', function () {
                    var hex = (hx.value || cp.value || '').trim();
                    if (!hex) return;
                    mb.palette.push(hex);
                    render();
                });
                document.getElementById('add-img-btn').addEventListener('click', function () {
                    var url = document.getElementById('new-img-url').value.trim();
                    if (!url) return;
                    mb.images.push({ url: url, caption: document.getElementById('new-img-cap').value.trim() });
                    render();
                });
                document.getElementById('save-btn').addEventListener('click', function () {
                    mb.description = document.getElementById('mb-desc').value.trim();
                    savePortalSection('moodboard', mb, document.getElementById('save-status'), document.getElementById('save-btn'));
                });
            }
        }
        if (window._portalReady) { initMoodboard(); } else { window.onPortalReady = initMoodboard; }
    </script>
</body>
</html>
