[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/Client/SeatingandLayout"
  to   = "/Client/seating-layout"
  status = 301

[[redirects]]
  from = "/Client/Seating-Layout"
  to   = "/Client/seating-layout"
  status = 301

[[redirects]]
  from = "/Prospect"
  to   = "/Stats"
  status = 301

[[redirects]]
  from = "/Prospect/*"
  to   = "/Stats/:splat"
  status = 301

[[redirects]]
  from = "/Stat"
  to   = "/Stats"
  status = 301

[[redirects]]
  from = "/Stat/*"
  to   = "/Stats/:splat"
  status = 301

# Guest seat finder — hashed URL rewrite (no login required)
[[redirects]]
  from   = "/gs/*"
  to     = "/gs.html"
  status = 200
