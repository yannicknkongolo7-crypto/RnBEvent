<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | RNB Events</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #faf9f6;
            color: #2d3a2d;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 24px;
        }
        .brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 5px;
            color: #527141;
            text-transform: uppercase;
            margin-bottom: 48px;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #b89a5e;
            margin: 0 auto 32px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(72px, 15vw, 120px);
            font-weight: 300;
            color: #e8e4dc;
            line-height: 1;
            margin-bottom: 8px;
        }
        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 400;
            color: #2d3a2d;
            margin-bottom: 16px;
        }
        p {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.8px;
            color: #777;
            line-height: 1.8;
            text-align: center;
            max-width: 340px;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            background: #527141;
            padding: 13px 32px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #3d5630; }
        .footer-note {
            position: fixed;
            bottom: 24px;
            font-size: 10px;
            letter-spacing: 1px;
            color: #c0bab0;
        }
    </style>
</head>
<body>
    <div class="brand">RNB Events</div>
    <h1>404</h1>
    <div class="divider"></div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for has moved or doesn't exist. Let us guide you back.</p>
    <a href="/" class="btn">Return Home</a>
    <span class="footer-note">&copy; RNB Events &mdash; Luxury Event Design</span>
</body>
</html>
