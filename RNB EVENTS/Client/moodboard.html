        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>

    <!-- Lightbox overlay -->
    <div id="mb-lightbox" class="mb-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
        <button class="mb-lightbox-close" id="mb-lb-close" aria-label="Close">&times;</button>
        <button class="mb-lightbox-arrow prev" id="mb-lb-prev" aria-label="Previous">&#8249;</button>
        <img class="mb-lightbox-img" id="mb-lb-img" src="" alt="">
        <p class="mb-lightbox-caption" id="mb-lb-caption"></p>

    <style>
        .mb-tab-bar { display:flex; gap:0; border-bottom:2px solid #e0dbd0; margin-bottom:28px; }
        .mb-tab-btn { background:none; border:none; cursor:pointer; font-family:Montserrat,sans-serif; font-size:11px; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:#7a7a6a; padding:10px 22px; border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .2s, border-color .2s; }
        .mb-tab-btn:hover { color:#527141; }
        .mb-tab-btn.active { color:#2d3a2d; border-bottom-color:#527141; }
        .mb-service-toggle-row { display:flex; align-items:center; gap:14px; margin-bottom:20px; padding:14px 18px; background:#f8f6f2; border-radius:4px; }
        .mb-toggle-label { font-family:Montserrat,sans-serif; font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:#527141; }
        .mb-toggle-switch { position:relative; display:inline-block; width:40px; height:22px; flex-shrink:0; }
        .mb-toggle-switch input { opacity:0; width:0; height:0; }
        .mb-toggle-slider { position:absolute; cursor:pointer; inset:0; background:#c8c0b4; border-radius:22px; transition:.3s; }
        .mb-toggle-slider:before { content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; }
        .mb-toggle-switch input:checked + .mb-toggle-slider { background:#527141; }
        .mb-toggle-switch input:checked + .mb-toggle-slider:before { transform:translateX(18px); }
        .mb-disabled-notice { text-align:center; padding:40px 20px; background:#f8f6f2; border-radius:6px; color:#9a9486; font-family:Montserrat,sans-serif; font-size:12px; letter-spacing:1px; }
        .mb-disabled-notice p { margin:6px 0 0; font-size:11px; color:#b0a896; }
        .mb-move-select { font-family:Montserrat,sans-serif; font-size:10px; letter-spacing:0.3px; background:#fff; border:1px solid #c8c0b4; border-radius:3px; padding:2px 4px; cursor:pointer; color:#527141; max-width:120px; margin-top:4px; display:block; }
        .mb-move-pal-select { font-family:Montserrat,sans-serif; font-size:10px; background:#fff; border:1px solid #c8c0b4; border-radius:3px; padding:1px 3px; cursor:pointer; color:#527141; max-width:100px; margin-top:3px; display:block; }
        .mb-img-caption-edit { width:100%; margin-top:5px; font-family:Montserrat,sans-serif; font-size:10px; letter-spacing:0.4px; color:#3d3a35; background:#f8f6f2; border:1px dashed #c8c0b4; border-radius:3px; padding:5px 7px; resize:none; min-height:38px; line-height:1.55; box-sizing:border-box; }
        .mb-img-caption-edit:focus { outline:none; border-color:#527141; background:#fff; }
        .mb-img-caption-edit::placeholder { color:#b0a896; font-style:italic; }
        .mb-caption-team-label { display:block; font-family:Montserrat,sans-serif; font-size:9px; font-weight:600; letter-spacing:1.5px; color:#527141; text-transform:uppercase; margin-top:5px; margin-bottom:1px; }
        .mb-signoff-row { display:flex; align-items:center; gap:14px; margin-top:28px; padding:18px 22px; background:#f4f2ee; border-radius:6px; border:1px solid #e0dbd0; flex-wrap:wrap; }
        .mb-signoff-row.mb-signoff-done { background:#edf3ea; border-color:#a8c49a; }
        .mb-signoff-label { font-family:Montserrat,sans-serif; font-size:11px; letter-spacing:1px; color:#7a7a6a; flex:1; min-width:180px; }
        .mb-signoff-pending { font-family:Montserrat,sans-serif; font-size:11px; letter-spacing:1.5px; color:#b0a896; font-style:italic; }
        .mb-approve-btn { background:#527141; color:#fff; border:none; cursor:pointer; font-family:Montserrat,sans-serif; font-size:11px; font-weight:500; letter-spacing:2px; text-transform:uppercase; padding:10px 24px; border-radius:3px; transition:background .2s; white-space:nowrap; }
        .mb-approve-btn:hover { background:#3e5630; }
        .mb-approved-badge { font-family:Montserrat,sans-serif; font-size:12px; font-weight:500; letter-spacing:0.5px; color:#3a6632; flex:1; min-width:180px; }
        .mb-revoke-btn { background:none; border:1px solid #c8a0a0; color:#b05a5a; cursor:pointer; font-family:Montserrat,sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:5px 12px; border-radius:3px; transition:all .2s; white-space:nowrap; }
        .mb-revoke-btn:hover { background:#b05a5a; color:#fff; }
        /* Lightbox */
        .mb-lightbox { display:none; position:fixed; inset:0; z-index:9999; background:rgba(20,20,18,0.93); align-items:center; justify-content:center; flex-direction:column; }
        .mb-lightbox.open { display:flex; }
        .mb-lightbox-img { max-width:90vw; max-height:80vh; border-radius:3px; box-shadow:0 8px 48px rgba(0,0,0,0.6); object-fit:contain; user-select:none; }
        .mb-lightbox-caption { margin-top:14px; font-family:Montserrat,sans-serif; font-size:12px; font-weight:300; letter-spacing:0.5px; color:rgba(248,246,242,0.75); text-align:center; max-width:560px; line-height:1.6; }
        .mb-lightbox-close { position:fixed; top:20px; right:28px; background:none; border:none; color:#f8f6f2; font-size:28px; cursor:pointer; opacity:0.7; line-height:1; padding:4px 8px; transition:opacity .2s; }
        .mb-lightbox-close:hover { opacity:1; }
        .mb-lightbox-arrow { position:fixed; top:50%; transform:translateY(-50%); background:none; border:none; color:#f8f6f2; font-size:36px; cursor:pointer; opacity:0.55; padding:8px 18px; line-height:1; transition:opacity .2s; user-select:none; }
        .mb-lightbox-arrow:hover { opacity:1; }
        .mb-lightbox-arrow.prev { left:12px; }
        .mb-lightbox-arrow.next { right:12px; }
        .mb-lightbox-counter { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); font-family:Montserrat,sans-serif; font-size:10px; letter-spacing:2px; color:rgba(248,246,242,0.45); }
        .moodboard-img { cursor:zoom-in; }
    </style>
    <script>
        function initMoodboard() {
            var client   = window.currentClient;
            var codeHash = window.currentCode;
            var el       = document.getElementById('moodboard-content');

            /* ── Migrate old flat format → category format ── */
            var raw = client.moodboard || {};
            var defaultCat = function() { return { enabled: false, description: '', palette: [], images: [] }; };
            var mb;
            if (raw.ceremony || raw.cocktails || raw.reception) {
                /* Already new format */
                mb = {
                    ceremony:  Object.assign(defaultCat(), raw.ceremony  || {}),
                    cocktails: Object.assign(defaultCat(), raw.cocktails || {}),
                    reception: Object.assign(defaultCat(), raw.reception || {})
                };
                if (!mb.ceremony.palette)  mb.ceremony.palette  = [];
                if (!mb.ceremony.images)   mb.ceremony.images   = [];
                if (!mb.cocktails.palette) mb.cocktails.palette = [];
                if (!mb.cocktails.images)  mb.cocktails.images  = [];
                if (!mb.reception.palette) mb.reception.palette = [];
                if (!mb.reception.images)  mb.reception.images  = [];
            } else {
                /* Old flat format — migrate to ceremony */
                mb = {
                    ceremony:  { enabled: true,  description: raw.description || '', palette: raw.palette || [], images: raw.images || [] },
                    cocktails: defaultCat(),
                    reception: defaultCat()
                };
            }

            var activeCategory = 'ceremony';
            var descTimers = {};

            render();

            function doSave(indicatorId) {
                var id  = indicatorId || 'mb-autosave';
                var ind = document.getElementById(id);
                if (ind) { ind.textContent = 'Saving…'; ind.className = 'tracking-autosave saving'; }
                fetch(window.RNB_SECTION_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codeHash: codeHash, section: 'moodboard', data: mb, editLogEntry: { ts: new Date().toISOString(), role: window.currentRole || 'couple', roleName: window.currentRoleName || 'Client', action: 'Updated moodboard' } })
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    var i = document.getElementById(id);
                    if (!i) return;
                    if (d && d.ok) { i.textContent = 'Saved ✓'; i.className = 'tracking-autosave saved'; setTimeout(function() { var x = document.getElementById(id); if (x) x.textContent = ''; }, 3000); }
                    else { i.textContent = '⚠ Save failed'; i.className = 'tracking-autosave error'; }
                })
                .catch(function() { var i = document.getElementById(id); if (i) { i.textContent = '⚠ No connection'; i.className = 'tracking-autosave error'; } });
            }

            function syncDesc() {
                var descEl = document.getElementById('mb-desc');
                if (descEl) mb[activeCategory].description = descEl.value.trim();
            }

            function renderTabBar() {
                var cats = [
                    { key: 'ceremony',  label: 'Ceremony' },
                    { key: 'cocktails', label: 'Cocktail Hour' },
                    { key: 'reception', label: 'Reception' }
                ];
                var html = '<div class="mb-tab-bar">';
                cats.forEach(function(c) {
                    html += '<button type="button" class="mb-tab-btn' + (activeCategory === c.key ? ' active' : '') + '" data-cat="' + c.key + '">' + c.label + '</button>';
                });
                html += '</div>';
                return html;
            }

            function renderCategoryContent(cat) {
                var data = mb[cat];
                var html = '';

                /* Service toggle */
                html += '<div class="mb-service-toggle-row">';
                html += '<label class="mb-toggle-switch"><input type="checkbox" id="mb-enabled"' + (data.enabled ? ' checked' : '') + '><span class="mb-toggle-slider"></span></label>';
                html += '<span class="mb-toggle-label">' + (data.enabled ? 'SERVICE ENABLED' : 'SERVICE DISABLED') + '</span>';
                html += '<span style="flex:1"></span>';
                html += '<span id="mb-autosave" class="tracking-autosave"></span>';
                html += '</div>';

                if (!data.enabled) {
                    html += '<div class="mb-disabled-notice">';
                    html += '<strong>This service is disabled</strong>';
                    html += '<p>Toggle the switch above to enable this section and add your vision.</p>';
                    html += '</div>';
                    return html;
                }

                /* Description */
                html += '<div class="tracking-section tracking-editable">';
                html += '<h2 class="tracking-section-title">Description</h2>';
                html += '<textarea id="mb-desc" class="tracking-input" style="width:100%;min-height:80px">' + escHtml(data.description || '') + '</textarea>';
                html += '</div>';

                /* Colour palette */
                html += '<div class="tracking-section tracking-editable">';
                html += '<h2 class="tracking-section-title">Colour Palette</h2>';
                if (data.palette.length) {
                    html += '<div class="palette-row" style="margin-bottom:16px">';
                    var otherCatsPal = [{key:'ceremony',label:'Ceremony'},{key:'cocktails',label:'Cocktail Hour'},{key:'reception',label:'Reception'}].filter(function(c){return c.key!==cat;});
                    data.palette.forEach(function (hex, i) {
                        html += '<div class="palette-swatch-edit">' +
                            '<div class="palette-swatch" style="background:' + escHtml(hex) + ';" title="' + escHtml(hex) + '"></div>' +
                            '<button type="button" class="palette-remove" data-index="' + i + '">&times;</button>' +
                            '<select class="mb-move-pal-select" data-index="' + i + '" title="Move to section">' +
                                '<option value="">&#8646; move to…</option>' +
                                otherCatsPal.map(function(c){return '<option value="'+c.key+'">'+c.label+'</option>';}).join('') +
                            '</select>' +
                        '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="edit-add-row">';
                html += '<input type="color" id="new-color" class="color-picker" value="#b89a5e">';
                html += '<input type="text" id="new-hex" class="tracking-input" placeholder="#b89a5e" maxlength="10" style="max-width:140px">';
                html += '<button type="button" id="add-color-btn" class="tracking-add-btn">+ ADD</button>';
                html += '</div>';
                html += '<p id="palette-status" class="tracking-autosave" style="min-height:18px"></p>';
                html += '</div>';

                /* Images */
                html += '<div class="tracking-section tracking-editable">';
                html += '<h2 class="tracking-section-title">Visual Direction</h2>';
                if (data.images.length) {
                    html += '<div class="moodboard-grid" style="margin-bottom:16px">';
                    var otherCatsImg = [{key:'ceremony',label:'Ceremony'},{key:'cocktails',label:'Cocktail Hour'},{key:'reception',label:'Reception'}].filter(function(c){return c.key!==cat;});
                    var isTeam = (window.currentRole === 'rnbTeam');
                    data.images.forEach(function (img, i) {
                        var src = typeof img === 'string' ? img : (img.url || '');
                        var cap = typeof img === 'object' ? (img.caption || '') : '';
                        var captionHtml;
                        if (isTeam) {
                            captionHtml =
                                '<span class="mb-caption-team-label">Caption / Note</span>' +
                                '<textarea class="mb-img-caption-edit" data-index="' + i + '" placeholder="Add a caption or note…" maxlength="400" rows="2">' + escHtml(cap) + '</textarea>';
                        } else {
                            captionHtml = cap ? '<p class="gallery-caption">' + escHtml(cap) + '</p>' : '';
                        }
                        html += '<div class="gallery-item-edit">' +
                            '<img src="' + escHtml(src) + '" class="moodboard-img" loading="lazy" data-mb-index="' + i + '" style="cursor:pointer">' +
                            captionHtml +
                            '<button type="button" class="tracking-remove-btn gallery-remove" data-index="' + i + '">&times;</button>' +
                            '<select class="mb-move-select" data-index="' + i + '" title="Move to section">' +
                                '<option value="">&#8646; move to…</option>' +
                                otherCatsImg.map(function(c){return '<option value="'+c.key+'">'+c.label+'</option>';}).join('') +
                            '</select>' +
                        '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="edit-add-row" style="align-items:center;gap:10px;flex-wrap:wrap">';
                html += '<input type="text" id="new-img-cap" class="tracking-input" placeholder="Caption (optional)" maxlength="300" style="flex:1;min-width:180px">';
                html += '<label class="tracking-upload-label" for="mb-file" style="cursor:pointer;padding:8px 16px;background:#527141;color:#fff;border-radius:3px;font-size:11px;letter-spacing:1.5px;white-space:nowrap">&#128247; UPLOAD PHOTO</label>';
                html += '<input type="file" id="mb-file" accept="image/*" style="display:none">';
                html += '</div>';
                html += '<p style="color:#888;font-size:11px;margin:6px 0 0">JPG / PNG / WebP &mdash; auto-compressed</p>';
                html += '<p id="mb-upload-progress" class="tracking-save-status" style="min-height:18px"></p>';
                html += '</div>';

                /* ── Client Signoff ── */
                var _isCouple = (window.currentRole === 'couple');
                var _isTeam   = (window.currentRole === 'rnbTeam');
                html += '<div class="mb-signoff-row' + (data.approvedAt ? ' mb-signoff-done' : '') + '">';
                if (data.approvedAt) {
                    var _aDate   = new Date(data.approvedAt);
                    var _months  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
                    var _d       = _aDate.getDate();
                    var _suf     = [11,12,13].indexOf(_d%100)>=0?'th':(['th','st','nd','rd'][_d%10]||'th');
                    var _aFmt    = _months[_aDate.getMonth()]+' '+_d+_suf+' '+_aDate.getFullYear()+', '+_aDate.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
                    html += '<span class="mb-approved-badge">&#10003; Approved by ' + escHtml(data.approvedBy || 'Client') + ' &mdash; ' + _aFmt + '</span>';
                    if (_isTeam) {
                        html += '<button type="button" class="mb-revoke-btn" id="mb-revoke-btn">REVOKE APPROVAL</button>';
                    }
                } else {
                    if (_isCouple) {
                        html += '<span class="mb-signoff-label">Review this section and confirm it matches your vision:</span>';
                        html += '<button type="button" class="mb-approve-btn" id="mb-approve-btn">&#10003; APPROVE THIS SECTION</button>';
                    } else {
                        html += '<span class="mb-signoff-pending">&#9744; Awaiting client approval</span>';
                    }
                }
                html += '</div>';

                return html;
            }

            function render() {
                // Hide loading state on first render
                var loadingEl = document.getElementById('portal-loading');
                if (loadingEl) loadingEl.remove();
                
                var html = renderTabBar();
                html += '<div id="mb-cat-content">';
                html += renderCategoryContent(activeCategory);
                html += '</div>';
                el.innerHTML = html;
                bindEvents();
            }

            function bindEvents() {
                /* Tab switches */
                el.querySelectorAll('.mb-tab-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        syncDesc();
                        activeCategory = this.dataset.cat;
                        render();
                    });
                });

                /* Toggle enabled */
                var toggleEl = document.getElementById('mb-enabled');
                if (toggleEl) {
                    toggleEl.addEventListener('change', function() {
                        syncDesc();
                        mb[activeCategory].enabled = this.checked;
                        render();
                        doSave('mb-autosave');
                    });
                }

                var data = mb[activeCategory];
                if (!data.enabled) return;

                /* Sync color picker ↔ text */
                var cp = document.getElementById('new-color');
                var hx = document.getElementById('new-hex');
                if (cp && hx) {
                    cp.addEventListener('input', function () { hx.value = cp.value; });
                    hx.addEventListener('input', function () { if (/^#[0-9a-f]{6}$/i.test(hx.value)) cp.value = hx.value; });
                }

                /* Description debounce */
                var descEl = document.getElementById('mb-desc');
                if (descEl) {
                    descEl.addEventListener('input', function () {
                        data.description = this.value.trim();
                        clearTimeout(descTimers[activeCategory]);
                        descTimers[activeCategory] = setTimeout(function () { doSave('mb-autosave'); }, 800);
                    });
                }

                el.querySelectorAll('.palette-remove').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        syncDesc();
                        data.palette.splice(parseInt(this.dataset.index), 1);
                        render();
                        doSave('palette-status');
                    });
                });

                el.querySelectorAll('.gallery-remove').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        syncDesc();
                        data.images.splice(parseInt(this.dataset.index), 1);
                        render();
                        doSave('mb-autosave');
                    });
                });

                el.querySelectorAll('.mb-move-select').forEach(function (sel) {
                    sel.addEventListener('change', function () {
                        var toCat = this.value;
                        if (!toCat) return;
                        syncDesc();
                        var item = mb[activeCategory].images.splice(parseInt(this.dataset.index), 1)[0];
                        mb[toCat].images = mb[toCat].images || [];
                        mb[toCat].images.push(item);
                        if (!mb[toCat].enabled) mb[toCat].enabled = true;
                        render();
                        doSave('mb-autosave');
                    });
                });

                el.querySelectorAll('.mb-move-pal-select').forEach(function (sel) {
                    sel.addEventListener('change', function () {
                        var toCat = this.value;
                        if (!toCat) return;
                        syncDesc();
                        var item = mb[activeCategory].palette.splice(parseInt(this.dataset.index), 1)[0];
                        mb[toCat].palette = mb[toCat].palette || [];
                        mb[toCat].palette.push(item);
                        if (!mb[toCat].enabled) mb[toCat].enabled = true;
                        render();
                        doSave('mb-autosave');
                    });
                });

                /* Lightbox for image zoom */
                (function() {
                    var imgs = el.querySelectorAll('.moodboard-img');
                    var lbImgList = [];
                    imgs.forEach(function(img, idx) {
                        var src = img.src || '';
                        var captionEl = img.closest('.gallery-item-edit');
                        var capText = '';
                        if (captionEl) {
                            var capP = captionEl.querySelector('.gallery-caption');
                            var capTA = captionEl.querySelector('.mb-img-caption-edit');
                            if (capP) capText = capP.textContent || '';
                            else if (capTA) capText = capTA.value || '';
                        }
                        lbImgList.push({ src: src, caption: capText });
                        img.addEventListener('click', function(e) { e.stopPropagation(); openLightbox(idx); });
                    });

                    var lb = document.getElementById('mb-lightbox');
                    var lbImg = document.getElementById('mb-lb-img');
                    var lbCap = document.getElementById('mb-lb-caption');
                    var lbCounter = document.getElementById('mb-lb-counter');
                    var lbClose = document.getElementById('mb-lb-close');
                    var lbPrev = document.getElementById('mb-lb-prev');
                    var lbNext = document.getElementById('mb-lb-next');
                    var currentIdx = 0;

                    function openLightbox(idx) {
                        if (!lbImgList.length) return;
                        currentIdx = idx;
                        showSlide(currentIdx);
                        lb.classList.add('open');
                        document.body.style.overflow = 'hidden';
                    }
                    function closeLightbox() {
                        lb.classList.remove('open');
                        document.body.style.overflow = '';
                    }
                    function showSlide(idx) {
                        var item = lbImgList[idx];
                        lbImg.src = item.src;
                        lbImg.alt = item.caption || '';
                        lbCap.textContent = item.caption || '';
                        lbCounter.textContent = (idx + 1) + ' / ' + lbImgList.length;
                        lbPrev.style.visibility = lbImgList.length > 1 ? '' : 'hidden';
                        lbNext.style.visibility = lbImgList.length > 1 ? '' : 'hidden';
                    }

                    if (lbClose) lbClose.onclick = closeLightbox;
                    if (lbPrev) lbPrev.onclick = function() { currentIdx = (currentIdx - 1 + lbImgList.length) % lbImgList.length; showSlide(currentIdx); };
                    if (lbNext) lbNext.onclick = function() { currentIdx = (currentIdx + 1) % lbImgList.length; showSlide(currentIdx); };
                    lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });
                    document.addEventListener('keydown', function lbKey(e) {
                        if (!lb.classList.contains('open')) return;
                        if (e.key === 'Escape') closeLightbox();
                        if (e.key === 'ArrowLeft') { currentIdx = (currentIdx - 1 + lbImgList.length) % lbImgList.length; showSlide(currentIdx); }
                        if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % lbImgList.length; showSlide(currentIdx); }
                    });
                })();

                /* Caption editing — rnbTeam only */
                var capTimers = {};
                el.querySelectorAll('.mb-img-caption-edit').forEach(function (ta) {
                    ta.addEventListener('input', function () {
                        var idx = parseInt(this.dataset.index);
                        var val = this.value;
                        data.images[idx] = (typeof data.images[idx] === 'string')
                            ? { url: data.images[idx], caption: val }
                            : Object.assign({}, data.images[idx], { caption: val });
                        clearTimeout(capTimers[idx]);
                        capTimers[idx] = setTimeout(function () { doSave('mb-autosave'); }, 800);
                    });
                });

                var addColorBtn = document.getElementById('add-color-btn');
                if (addColorBtn && cp && hx) {
                    addColorBtn.addEventListener('click', function () {
                        var hex = (hx.value || cp.value || '').trim();
                        if (!hex) return;
                        syncDesc();
                        data.palette.push(hex);
                        render();
                        doSave('palette-status');
                    });
                }

                var fileEl = document.getElementById('mb-file');
                if (fileEl) {
                    fileEl.addEventListener('change', function () {
                        var file = this.files[0];
                        if (!file) return;
                        var prog = document.getElementById('mb-upload-progress');
                        this.disabled = true;
                        uploadPortalFile(file, function (msg) { if (prog) { prog.textContent = msg; prog.className = 'tracking-save-status'; } })
                            .then(function (url) {
                                syncDesc();
                                var cap = document.getElementById('new-img-cap');
                                data.images.push({ url: url, caption: cap ? cap.value.trim() : '' });
                                render();
                                doSave('mb-autosave');
                            })
                            .catch(function (e) {
                                var p = document.getElementById('mb-upload-progress');
                                if (p) { p.textContent = 'Upload failed: ' + e.message; p.className = 'tracking-save-status save-err'; }
                            })
                            .then(function () {
                                var fi = document.getElementById('mb-file');
                                if (fi) { fi.disabled = false; fi.value = ''; }
                            });
                    });
                }

                /* Approve / revoke signoff */
                var approveBtn = document.getElementById('mb-approve-btn');
                if (approveBtn) {
                    approveBtn.addEventListener('click', function() {
                        syncDesc();
                        mb[activeCategory].approvedAt = new Date().toISOString();
                        mb[activeCategory].approvedBy = window.currentRoleName || 'Client';
                        render();
                        doSave('mb-autosave');
                    });
                }
                var revokeBtn = document.getElementById('mb-revoke-btn');
                if (revokeBtn) {
                    revokeBtn.addEventListener('click', function() {
                        syncDesc();
                        delete mb[activeCategory].approvedAt;
                        delete mb[activeCategory].approvedBy;
                        render();
                        doSave('mb-autosave');
                    });
                }
            }
        }
        if (window._portalReady) { initMoodboard(); } else { window.onPortalReady = initMoodboard; }
    </script>
    <script src="/cookie-consent.js"></script>
</body>
</html>
