<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Documents &amp; Contracts</h1>
        </div>
    </div>

    <main class="container subpage-content" id="documents-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        function initDocuments() {
            var client = window.currentClient;
            var el     = document.getElementById('documents-content');
            var items  = (client.documents || []).map(function (d) {
                return { name: d.name || '', type: d.type || 'Document', url: d.url || '', date: d.date || '' };
            });

            render();

            function render() {
                var html = '';
                if (items.length) {
                    html += '<div class="documents-list">';
                    items.forEach(function (doc, i) {
                        html += '<div class="doc-row">' +
                            '<div class="doc-info">' +
                                '<p class="doc-type">' + escHtml(doc.type) + '</p>' +
                                '<p class="doc-name">' + escHtml(doc.name) + '</p>' +
                                (doc.date ? '<p class="doc-date">' + escHtml(doc.date) + '</p>' : '') +
                            '</div>' +
                            '<div class="doc-actions">' +
                                '<a href="' + escHtml(doc.url) + '" target="_blank" rel="noopener" class="doc-link">OPEN &rarr;</a>' +
                                '<button type="button" class="tracking-remove-btn" data-index="' + i + '" title="Remove">&times;</button>' +
                            '</div>' +
                        '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="tracking-section tracking-editable" style="margin-top:30px">';
                html += '<h3 class="tracking-section-title" style="font-size:16px">Add Document</h3>';
                html += '<div class="edit-add-row">';
                html += '<input type="text" id="d-name" class="tracking-input" placeholder="Document name" maxlength="200">';
                html += '<input type="text" id="d-type" class="tracking-input" placeholder="Type (e.g. Contract)" maxlength="100">';
                html += '</div>';
                html += '<div class="edit-add-row">';
                html += '<input type="url" id="d-url" class="tracking-input" placeholder="URL (https://...)" maxlength="2000">';
                html += '<input type="date" id="d-date" class="tracking-input" maxlength="50">';
                html += '<button type="button" id="add-btn" class="tracking-add-btn">+ ADD</button>';
                html += '</div>';
                html += '<button type="button" id="save-btn" class="tracking-save-btn">SAVE CHANGES</button>';
                html += '<p id="save-status" class="tracking-save-status"></p>';
                html += '</div>';
                el.innerHTML = html;

                el.querySelectorAll('.tracking-remove-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () { items.splice(parseInt(this.dataset.index), 1); render(); });
                });
                document.getElementById('add-btn').addEventListener('click', function () {
                    var n = document.getElementById('d-name').value.trim();
                    var u = document.getElementById('d-url').value.trim();
                    if (!n || !u) return;
                    items.push({ name: n, type: document.getElementById('d-type').value.trim() || 'Document', url: u, date: window.toDDMMYYYY(document.getElementById('d-date').value.trim()) });
                    render();
                });
                document.getElementById('save-btn').addEventListener('click', function () {
                    savePortalSection('documents', items, document.getElementById('save-status'), document.getElementById('save-btn'));
                });
            }
        }
        if (window._portalReady) { initDocuments(); } else { window.onPortalReady = initDocuments; }
    </script>
</body>
</html>
