<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧹 Clean Archived Clients | RNB Events</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        .panel {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 {
            color: #dc2626;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .alert {
            padding: 20px;
            margin: 20px 0;
            border-radius: 6px;
            border-left: 4px solid;
        }
        .success {
            background: #d1fae5;
            border-left-color: #10b981;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            border-left-color: #ef4444;
            color: #991b1b;
        }
        .info {
            background: #dbeafe;
            border-left-color: #3b82f6;
            color: #1e3a8a;
        }
        .warning {
            background: #fef3c7;
            border-left-color: #f59e0b;
            color: #92400e;
        }
        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin: 10px 0;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }
        th {
            background: #f1f5f9;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #cbd5e1;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover {
            background: #f8fafc;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-archived {
            background: #fecaca;
            color: #991b1b;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .stat-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h1>🧹 Clean Archived Clients</h1>
            <p class="subtitle">Permanently remove archived clients from localStorage</p>
            
            <div class="alert warning">
                <strong>⚠️ WARNING</strong>
                <p>This will permanently delete all archived clients from your localStorage.</p>
                <p>Active and disabled clients will be kept.</p>
            </div>
            
            <div id="status"></div>
            
            <div id="clients-list"></div>
            
            <button class="btn btn-danger" onclick="cleanArchived()" id="clean-btn" style="display:none;">
                🗑️ DELETE ALL ARCHIVED CLIENTS
            </button>
            
            <div id="result"></div>
        </div>
    </div>

    <script>
        let allClients = [];
        let archivedClients = [];

        function loadClients() {
            const statusDiv = document.getElementById('status');
            const listDiv = document.getElementById('clients-list');
            
            const data = localStorage.getItem('rnb_admin_clients');
            if (!data) {
                statusDiv.innerHTML = '<div class="alert error">❌ No clients found in localStorage!</div>';
                return;
            }

            try {
                allClients = JSON.parse(data);
                if (!Array.isArray(allClients)) {
                    statusDiv.innerHTML = '<div class="alert error">❌ Invalid client data!</div>';
                    return;
                }

                const active = allClients.filter(c => !c.archived && c.active !== false);
                const disabled = allClients.filter(c => !c.archived && c.active === false);
                archivedClients = allClients.filter(c => c.archived === true);

                statusDiv.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-number">${allClients.length}</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" style="color:#10b981;">${active.length}</div>
                            <div class="stat-label">Active</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" style="color:#ef4444;">${archivedClients.length}</div>
                            <div class="stat-label">Archived</div>
                        </div>
                    </div>
                `;

                if (archivedClients.length === 0) {
                    statusDiv.innerHTML += '<div class="alert info">✅ No archived clients found! Your localStorage is clean.</div>';
                    return;
                }

                // Show archived clients table
                let html = '<div class="alert warning"><strong>Found ' + archivedClients.length + ' archived client(s) to delete:</strong></div>';
                html += '<table><thead><tr><th>Name</th><th>Event</th><th>Date</th><th>Archived Date</th></tr></thead><tbody>';
                archivedClients.forEach(c => {
                    const name = c.fullName || c.name || c.firstName || '–';
                    const event = c.eventType || '–';
                    const date = c.eventDate || '–';
                    const archived = c.archivedDate ? new Date(c.archivedDate).toLocaleDateString() : 'Unknown';
                    html += `<tr>
                        <td><strong>${escapeHtml(name)}</strong></td>
                        <td>${escapeHtml(event)}</td>
                        <td>${escapeHtml(date)}</td>
                        <td>${archived}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                listDiv.innerHTML = html;

                document.getElementById('clean-btn').style.display = 'block';

            } catch (e) {
                statusDiv.innerHTML = `<div class="alert error">❌ Error parsing clients: ${e.message}</div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        function cleanArchived() {
            if (!confirm('⚠️ Are you sure? This will PERMANENTLY DELETE ' + archivedClients.length + ' archived client(s)!')) {
                return;
            }

            if (!confirm('⚠️ FINAL WARNING: This cannot be undone! Delete ' + archivedClients.length + ' archived clients?')) {
                return;
            }

            const btn = document.getElementById('clean-btn');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = '🗑️ DELETING...';

            try {
                // Keep only active and disabled clients (remove archived)
                const cleanClients = allClients.filter(c => c.archived !== true);
                
                // Save to localStorage
                localStorage.setItem('rnb_admin_clients', JSON.stringify(cleanClients));
                
                resultDiv.innerHTML = `
                    <div class="alert success">
                        <h3>✅ CLEANED!</h3>
                        <p><strong>Deleted ${archivedClients.length} archived client(s)</strong></p>
                        <p><strong>Kept ${cleanClients.length} active/disabled client(s)</strong></p>
                        <p>Your localStorage is now clean!</p>
                    </div>
                    <div class="alert info">
                        <strong>📤 NEXT STEP:</strong>
                        <p>Upload your clean client list to S3 cloud storage:</p>
                    </div>
                    <button class="btn btn-success" onclick="window.location.href='./upload-clients-to-s3.html'">
                        ☁️ UPLOAD TO S3 CLOUD
                    </button>
                `;
                btn.style.display = 'none';

            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="alert error">
                        <h3>❌ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                btn.disabled = false;
                btn.textContent = '🗑️ RETRY DELETE';
            }
        }

        // Auto-load on page load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadClients, 300);
        });
    </script>
</body>
</html>
