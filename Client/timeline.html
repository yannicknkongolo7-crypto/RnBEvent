<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK2C6GZWJZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DK2C6GZWJZ');
    </script>
    <title>Planning Timeline | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Planning Timeline</h1>
        </div>
    </div>

    <main class="container subpage-content" id="timeline-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        function initTimeline() {
            var client = window.currentClient;
            var el = document.getElementById('timeline-content');
            var items = (client.timeline || []).map(function (item) {
                return { date: item.date || '', milestone: item.milestone || '', notes: item.notes || '', status: item.status || 'upcoming' };
            });

            render();

            function render() {
                var html = '';
                if (items.length) {
                    html += '<div class="timeline">';
                    items.forEach(function (item, i) {
                        html += '<div class="timeline-item ' + item.status + '">' +
                            '<div class="timeline-marker"></div>' +
                            '<div class="timeline-body">' +
                                '<span class="timeline-date">' + escHtml(item.date) + '</span>' +
                                '<h3 class="timeline-milestone">' + escHtml(item.milestone) + '</h3>' +
                                '<p class="timeline-notes">' + escHtml(item.notes) + '</p>' +
                                '<div class="edit-controls">' +
                                    '<select class="tracking-status-select status-' + item.status + '" data-index="' + i + '">' +
                                        sOpt('upcoming', item.status) + sOpt('in-progress', item.status) + sOpt('done', item.status) +
                                    '</select>' +
                                    '<button type="button" class="tracking-remove-btn" data-index="' + i + '" title="Remove">&times;</button>' +
                                '</div>' +
                            '</div>' +
                        '</div>';
                    });
                    html += '</div>';
                }
                html += '<div class="tracking-section tracking-editable" style="margin-top:30px">';
                html += '<h3 class="tracking-section-title" style="font-size:16px">Add Milestone</h3>';
                html += '<div class="edit-add-row">';
                html += '<input type="date" id="new-date" class="tracking-input" maxlength="100">';
                html += '<input type="text" id="new-milestone" class="tracking-input" placeholder="Milestone name" maxlength="200">';
                html += '<input type="text" id="new-notes" class="tracking-input" placeholder="Notes (optional)" maxlength="500">';
                html += '<button type="button" id="add-btn" class="tracking-add-btn">+ ADD</button>';
                html += '</div>';
                html += '<button type="button" id="save-btn" class="tracking-save-btn">SAVE CHANGES</button>';
                html += '<p id="save-status" class="tracking-save-status"></p>';
                html += '</div>';
                el.innerHTML = html;

                el.querySelectorAll('.tracking-status-select').forEach(function (sel) {
                    sel.addEventListener('change', function () { items[parseInt(this.dataset.index)].status = this.value; render(); });
                });
                el.querySelectorAll('.tracking-remove-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () { items.splice(parseInt(this.dataset.index), 1); render(); });
                });
                document.getElementById('add-btn').addEventListener('click', addItem);
                document.getElementById('save-btn').addEventListener('click', save);
            }

            function addItem() {
                var m = document.getElementById('new-milestone').value.trim();
                if (!m) return;
                items.push({ date: window.toDDMMYYYY(document.getElementById('new-date').value.trim()), milestone: m, notes: document.getElementById('new-notes').value.trim(), status: 'upcoming' });
                render();
            }

            function save() { savePortalSection('timeline', items, document.getElementById('save-status'), document.getElementById('save-btn')); }

            function sOpt(v, cur) {
                var l = { upcoming: 'Upcoming', 'in-progress': 'In Progress', done: 'Done' };
                return '<option value="' + v + '"' + (v === cur ? ' selected' : '') + '>' + (l[v] || v) + '</option>';
            }
        }
        if (window._portalReady) { initTimeline(); } else { window.onPortalReady = initTimeline; }
    </script>
</body>
</html>
