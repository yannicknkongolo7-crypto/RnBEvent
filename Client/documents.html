<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK2C6GZWJZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DK2C6GZWJZ');
    </script>
    <title>Documents | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Documents &amp; Contracts</h1>
        </div>
    </div>

    <main class="container subpage-content" id="documents-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="/remus-track.js"></script>
    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        function initDocuments() {
            var client = window.currentClient;
            var role     = window.currentRole     || 'couple';
            var roleName = window.currentRoleName || 'Client';
            var el     = document.getElementById('documents-content');
            var items  = (client.documents || []).map(function (d) {
                return { name: d.name || '', type: d.type || 'Document', url: d.url || '', date: d.date || '' };
            });

            /* Agreement state */
            var agr = Object.assign({ status: 'pending', coupleSignature: '', coupleSignedAt: '', plannerSignature: '', plannerSignedAt: '' }, client.agreement || {});

            renderAll();

            function doSave() {
                var ind = document.getElementById('docs-autosave');
                if (ind) { ind.textContent = 'Saving…'; ind.className = 'tracking-autosave saving'; }
                fetch(window.RNB_SECTION_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codeHash: window.currentCode, section: 'documents', data: items, editLogEntry: { ts: new Date().toISOString(), role: role, roleName: roleName, action: 'Updated documents' } })
                })
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    var i = document.getElementById('docs-autosave');
                    if (!i) return;
                    if (d && d.ok) { i.textContent = 'Saved ✓'; i.className = 'tracking-autosave saved'; setTimeout(function() { var x = document.getElementById('docs-autosave'); if (x) x.textContent = ''; }, 3000); }
                    else { i.textContent = '⚠ Save failed'; i.className = 'tracking-autosave error'; }
                })
                .catch(function() { var i = document.getElementById('docs-autosave'); if (i) { i.textContent = '⚠ No connection'; i.className = 'tracking-autosave error'; } });
            }

            function renderAll() {
                var html = '';

                /* ─── Agreement Section ─── */
                var statusLabel = { pending: 'PENDING SIGNATURES', 'couple-signed': 'COUPLE SIGNED — AWAITING PLANNER', 'fully-executed': 'FULLY EXECUTED' };
                var plannerName = client.planner || 'RNB Events Team';
                var clientName  = client.fullName || client.firstName || 'Client';
                var eventDate   = client.eventDate   || 'TBD';
                var eventType   = client.eventType   || 'Event';
                var eventVenue  = client.eventVenue  || 'TBD';

                html += '<div class="agreement-wrapper">';
                html += '<div class="agreement-header">';
                html += '<p class="doc-type" style="margin:0">EVENT PLANNING AGREEMENT</p>';
                html += '<span class="agreement-status-badge status-' + agr.status + '">' + escHtml(statusLabel[agr.status] || agr.status) + '</span>';
                if (agr.status === 'fully-executed') {
                    html += '<span class="agreement-signed-badge">SIGNED</span>';
                }
                html += '</div>';

                html += '<div class="agreement-body">';
                html += '<div class="agreement-text">';
                html += '<h3>Event Vendor Agreement</h3>';
                html += '<p>This Event Vendor Agreement (&ldquo;Agreement&rdquo;) is entered into between:</p>';
                html += '<p><strong>' + escHtml(plannerName) + '</strong> (&ldquo;Vendor&rdquo;) and <strong>' + escHtml(clientName) + '</strong> (&ldquo;Client&rdquo;)</p>';
                html += '<p>for the following event:</p>';
                html += '<p><strong>Event Type:</strong> ' + escHtml(eventType) + '<br>';
                html += '<strong>Event Date:</strong> ' + escHtml(eventDate) + '<br>';
                html += '<strong>Venue:</strong> ' + escHtml(eventVenue) + '</p>';
                html += '<h3>Services</h3>';
                html += '<p>The Vendor agrees to provide the decoration and design services outlined in the Client&rsquo;s mood board and written proposal (the &ldquo;Working Scope&rdquo;), which is subject to revision by mutual agreement until the Final Design Approval date defined below. Once the Final Design Approval is confirmed, no further changes are included without additional charges. Agreed services cover the following:</p>';
                html += '<ul>';
                html += '<li><strong>D&eacute;cor Concept &amp; Mood Board:</strong> Custom concept development and collaborative mood board creation. The mood board serves as the living design document and may be revised by mutual written agreement up to <strong>30 days prior to the event date</strong>. The version approved at the Final Design Approval date constitutes the binding &ldquo;Final Approved Scope.&rdquo;</li>';
                html += '<li><strong>Sourcing &amp; Procurement:</strong> Sourcing, procurement, and delivery of all decorative elements <em>specifically listed</em> in the Final Approved Scope (which may include florals, linens, lighting, centerpieces, backdrops, signage, and related items). Items not listed in the Final Approved Scope are not included and cannot be assumed.</li>';
                html += '<li><strong>Setup &amp; Installation:</strong> Full setup, styling, and installation of all Final Approved Scope d&eacute;cor at the designated venue prior to the event start time.</li>';
                html += '<li><strong>Vendor Coordination:</strong> Coordination with venue staff and other vendors solely as it relates to the execution of the Final Approved Scope d&eacute;cor.</li>';
                html += '<li><strong>Breakdown &amp; Removal:</strong> Post-event breakdown, removal, and cleanup of all Vendor-supplied d&eacute;cor items included in the Final Approved Scope.</li>';
                html += '</ul>';
                html += '<h3>Design Scope &amp; Final Approval</h3>';
                html += '<p>The parties acknowledge that event design is a collaborative, evolving process. The following rules govern design revisions and scope changes under this agreement:</p>';
                html += '<ul>';
                html += '<li><strong>Revision Window:</strong> The Client may request revisions to the mood board and Working Scope at any time up to <strong>30 days before the event date</strong>. All revision requests must be submitted in writing (email or through the client portal) and are subject to the Vendor&rsquo;s written acknowledgment and approval.</li>';
                html += '<li><strong>Final Design Approval:</strong> No later than <strong>30 days prior to the event</strong>, the Vendor will present the then-current mood board for final written sign-off. Once the Client provides written approval (or the 30-day deadline passes without Client objection), the scope becomes the &ldquo;Final Approved Scope&rdquo; and is <strong>locked</strong>. No further changes are included at no extra cost after this point.</li>';
                html += '<li><strong>Approved Scope Governs:</strong> This agreement, once signed, secures the Vendor&rsquo;s availability and the agreed pricing based on the Working Scope at time of signing. The Final Approved Scope will govern actual deliverables. If the Final Approved Scope differs materially from the Working Scope, a written amendment confirming any pricing adjustments must be agreed before the lock date.</li>';
                html += '</ul>';
                html += '<div style="margin:16px 0;padding:14px 18px;background:#f5f2ec;border-left:3px solid #2d3a2d;border-radius:0 4px 4px 0;">';
                html += '<p style="margin:0;font-family:Montserrat,sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;color:#2d3a2d;text-transform:uppercase;margin-bottom:6px">Add-Ons &amp; Changes After Lock Date</p>';
                html += '<p style="margin:0;font-size:12px;color:#3d3a35;line-height:1.8">Any decorative elements, services, or requests <strong>not included in the Final Approved Scope</strong> are considered add-ons and are subject to <strong>additional charges</strong>. All add-ons must be requested in writing, approved by the Vendor, and confirmed with a revised quote or written amendment prior to execution. The Vendor is under no obligation to accommodate add-on requests that cannot be fulfilled within the original event timeline, sourcing lead times, or budget.</p>';
                html += '</div>';
                html += '<h3>Client Responsibilities</h3>';
                html += '<ul>';
                html += '<li>Participate actively in the mood board and design review process and provide timely written feedback on all design proposals.</li>';
                html += '<li>Submit all scope revision requests in writing no later than <strong>30 days before the event date</strong>.</li>';
                html += '<li>Provide written Final Design Approval no later than 30 days before the event, or acknowledge that the Vendor&rsquo;s submitted scope shall be deemed approved.</li>';
                html += '<li>Fulfill all financial obligations per the agreed payment schedule, including any additional charges resulting from approved add-ons or scope amendments.</li>';
                html += '<li>Ensure the designated venue is accessible to the Vendor for setup and breakdown at the agreed times.</li>';
                html += '<li>Notify the Vendor promptly of any changes to the event date, venue, or other logistical details that may affect d&eacute;cor planning or delivery.</li>';
                html += '</ul>';
                html += '<h3>Fees &amp; Payment</h3>';
                if (client.agreedAmount && Number(client.agreedAmount) > 0) {
                    var fmtAmt = '$' + Number(client.agreedAmount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    html += '<p>The total agreed amount for all services rendered under this agreement is <strong>' + escHtml(fmtAmt) + '</strong>, payable per the mutually agreed payment schedule.</p>';
                    html += '<p>A non-refundable booking retainer (deposit) is required to secure the event date. Payment of the retainer constitutes acceptance of the terms of this agreement and reserves the date exclusively for the Client.</p>';
                    html += '<div style="margin:16px 0;padding:14px 18px;background:#fdf6ec;border-left:3px solid #b89a5e;border-radius:0 4px 4px 0;">';
                    html += '<p style="margin:0;font-family:Montserrat,sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;color:#7a5c00;text-transform:uppercase;margin-bottom:6px">Disclaimer — Deposit Included</p>';
                    html += '<p style="margin:0;font-size:12px;color:#5a4a2a;line-height:1.7">The agreed total amount of <strong>' + escHtml(fmtAmt) + '</strong> stated in this agreement <strong>includes the non-refundable deposit</strong>. The deposit portion is due upon signing and is non-refundable under all circumstances, including cancellation or change of date. The remaining balance is due per the agreed payment schedule outlined by your Vendor.</p>';
                    html += '</div>';
                } else {
                    html += '<p>Fees and payment terms are as agreed upon in the separate fee schedule or proposal document. A non-refundable booking retainer is required to secure the event date.</p>';
                    html += '<div style="margin:16px 0;padding:14px 18px;background:#fdf6ec;border-left:3px solid #b89a5e;border-radius:0 4px 4px 0;">';
                    html += '<p style="margin:0;font-family:Montserrat,sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;color:#7a5c00;text-transform:uppercase;margin-bottom:6px">Disclaimer — Deposit Included</p>';
                    html += '<p style="margin:0;font-size:12px;color:#5a4a2a;line-height:1.7">The agreed total amount stated in this agreement <strong>includes the non-refundable deposit</strong>. The deposit portion is non-refundable under all circumstances.</p>';
                    html += '</div>';
                }
                html += '<h3>Cancellation Policy</h3>';
                html += '<p>In the event of cancellation by the Client:</p>';
                html += '<ul>';
                html += '<li>The non-refundable deposit/retainer is forfeited in full under all circumstances, including change of date or venue.</li>';
                html += '<li>Cancellations made <strong>more than 60 days</strong> before the event date: deposit forfeited; no further balance is owed.</li>';
                html += '<li>Cancellations made <strong>between 31 and 60 days</strong> before the event date: 50% of the remaining balance (after deposit) is due, as materials sourcing and planning will have commenced.</li>';
                html += '<li>Cancellations made <strong>30 days or fewer</strong> before the event date: the full contract amount is due, as the Final Approved Scope will have been locked and all materials procured or committed.</li>';
                html += '</ul>';
                html += '<p>Date changes are subject to Vendor availability and may be treated as a cancellation and rebook at the Vendor&rsquo;s discretion. Any previously approved scope or pricing is not guaranteed upon a date change.</p>';
                html += '<h3>Privacy &amp; Data Security</h3>';
                html += '<p>RNB Events takes the privacy and security of all client and vendor information seriously. All personal data, event details, financial information, contract terms, and communications shared under this agreement and through the RNB Events Client Portal are handled with the highest standard of care. Information is stored securely using industry-standard encryption and access-control measures. Neither party shall disclose the other&rsquo;s personal, financial, or logistical details to any third party without prior written consent, except as required by applicable law. RNB Events will never sell, rent, or share client information for marketing or commercial purposes.</p>';
                html += '<h3>Confidentiality</h3>';
                html += '<p>Both parties agree to keep the terms of this agreement and any proprietary information confidential.</p>';
                html += '<h3>Agreement</h3>';
                html += '<p>By signing below, both parties agree to the terms and conditions of this Event Vendor Agreement. The Client acknowledges that: (1) this agreement secures the Vendor&rsquo;s services based on the Working Scope at time of signing; (2) the mood board and design details may be collaboratively refined until the Final Design Approval date (30 days before the event); and (3) any changes requested after the Final Design Approval date are subject to additional charges and Vendor availability. This agreement becomes legally binding when signed by both parties.</p>';
                html += '</div>'; /* end .agreement-text */

                /* ─── Contract Attachments ─── */
                var agrAttachments = agr.attachments || [];
                html += '<div class="agreement-attachments">';
                html += '<p class="sig-block-title" style="margin-bottom:10px">Supporting Documents &amp; Communications</p>';
                if (agrAttachments.length) {
                    html += '<div class="contract-attachments-grid">';
                    agrAttachments.forEach(function (att, i) {
                        var isImg = /\.(png|jpg|jpeg|webp|gif)(\?|$)/i.test(att.url);
                        html += '<div class="contract-attachment-item">';
                        if (isImg) {
                            html += '<a href="' + escHtml(att.url) + '" target="_blank" rel="noopener">';
                            html += '<img src="' + escHtml(att.url) + '" alt="' + escHtml(att.name) + '" class="contract-attachment-thumb">';
                            html += '</a>';
                        } else {
                            html += '<a href="' + escHtml(att.url) + '" target="_blank" rel="noopener" class="contract-attachment-link">OPEN &rarr;</a>';
                        }
                        html += '<p class="contract-attachment-name">' + escHtml(att.name) + '</p>';
                        if (att.caption) html += '<p class="contract-attachment-caption">' + escHtml(att.caption) + '</p>';
                        if (role === 'planner' || role === 'rnbTeam') {
                            html += '<button type="button" class="tracking-remove-btn contract-att-remove" data-att-index="' + i + '" title="Remove">&times;</button>';
                        }
                        html += '</div>';
                    });
                    html += '</div>';
                } else {
                    html += '<p class="sig-awaiting" style="margin-top:0">No attachments added yet.</p>';
                }
                if (role === 'planner' || role === 'rnbTeam') {
                    html += '<div class="agreement-att-form">';
                    html += '<input type="text" id="att-name" class="tracking-input" placeholder="Label (e.g. Design Conversation Screenshot)" maxlength="200">';
                    html += '<input type="text" id="att-caption" class="tracking-input" placeholder="Caption or note (optional)" maxlength="300">';
                    html += '<div style="display:flex;align-items:center;gap:10px;margin-top:6px">';
                    html += '<input type="file" id="att-file" accept=".pdf,.png,.jpg,.jpeg,.webp,.gif" style="font-family:Montserrat,sans-serif;font-size:11px;flex:1;color:var(--text-mid)">';
                    html += '<span id="att-file-status" style="font-family:Montserrat,sans-serif;font-size:11px;color:var(--sage);white-space:nowrap"></span>';
                    html += '</div>';
                    html += '<button type="button" id="att-add-btn" class="tracking-add-btn" style="margin-top:8px">+ ADD ATTACHMENT</button>';
                    html += '</div>';
                }
                html += '</div>'; /* end .agreement-attachments */

                /* ─── Signatures ─── */
                html += '<div class="agreement-signatures">';

                /* Couple signature block */
                html += '<div class="sig-block">';
                html += '<p class="sig-block-title">Client Signature — ' + escHtml(clientName) + '</p>';
                if (agr.coupleSignature) {
                    html += '<p class="sig-signed-display">' + escHtml(agr.coupleSignature) + '</p>';
                    html += '<p class="sig-signed-date">Signed ' + escHtml(agr.coupleSignedAt ? formatNoteTs(agr.coupleSignedAt) : '') + '</p>';
                    html += '<span class="sig-signed-check">Signed</span>';
                } else if (role === 'couple') {
                    html += '<div class="sig-input-wrapper">';
                    html += '<p class="sig-hint">Type your full legal name below to sign this agreement.</p>';
                    html += '<input type="text" id="couple-sig-input" class="sig-input" placeholder="Your Full Name" maxlength="200" autocomplete="name">';
                    html += '<button type="button" class="sig-submit-btn" id="couple-sig-btn">SIGN AGREEMENT</button>';
                    html += '<p id="couple-sig-status" class="sig-status-msg"></p>';
                    html += '</div>';
                } else {
                    html += '<p class="sig-awaiting">Awaiting client signature.</p>';
                }
                html += '</div>';

                /* Planner signature block */
                html += '<div class="sig-block">';
                html += '<p class="sig-block-title">Vendor Signature — ' + escHtml(plannerName) + '</p>';
                if (agr.plannerSignature) {
                    html += '<p class="sig-signed-display">' + escHtml(agr.plannerSignature) + '</p>';
                    html += '<p class="sig-signed-date">Signed ' + escHtml(agr.plannerSignedAt ? formatNoteTs(agr.plannerSignedAt) : '') + '</p>';
                    html += '<span class="sig-signed-check">Signed</span>';
                } else if (role === 'planner' || role === 'rnbTeam') {
                    if (!agr.coupleSignature) {
                        html += '<p class="sig-awaiting">Available after client signs.</p>';
                    } else {
                        html += '<div class="sig-input-wrapper">';
                        html += '<p class="sig-hint">Type your full name to countersign this agreement.</p>';
                        html += '<input type="text" id="planner-sig-input" class="sig-input" placeholder="Your Full Name" maxlength="200" autocomplete="name">';
                        html += '<button type="button" class="sig-submit-btn" id="planner-sig-btn">COUNTERSIGN</button>';
                        html += '<p id="planner-sig-status" class="sig-status-msg"></p>';
                        html += '</div>';
                    }
                } else {
                    html += '<p class="sig-awaiting">Awaiting planner countersignature.</p>';
                }
                html += '</div>';

                html += '</div>'; /* end .agreement-signatures */
                html += '</div>'; /* end .agreement-body */

                /* Admin-only: Reset agreement for a new contract */
                if (role === 'rnbTeam' && agr.status !== 'pending') {
                    html += '<div class="agreement-reset-section">';
                    html += '<button type="button" class="agreement-reset-btn" id="reset-agreement-btn">RESET AGREEMENT FOR NEW CONTRACT</button>';
                    html += '<p id="reset-agreement-status" class="sig-status-msg"></p>';
                    html += '</div>';
                }

                html += '</div>'; /* end .agreement-wrapper */

                /* ─── Existing documents list ─── */
                if (items.length) {
                    html += '<div class="documents-list">';
                    items.forEach(function (doc, i) {
                        html += '<div class="doc-row">' +
                            '<div class="doc-info">' +
                                '<p class="doc-type">' + escHtml(doc.type) + '</p>' +
                                '<p class="doc-name">' + escHtml(doc.name) + '</p>' +
                                (doc.date ? '<p class="doc-date">' + escHtml(doc.date) + '</p>' : '') +
                            '</div>' +
                            '<div class="doc-actions">' +
                                '<a href="' + escHtml(doc.url) + '" target="_blank" rel="noopener" class="doc-link">OPEN &rarr;</a>' +
                                '<button type="button" class="tracking-remove-btn" data-index="' + i + '" title="Remove">&times;</button>' +
                            '</div>' +
                        '</div>';
                    });
                    html += '</div>';
                }

                /* Add document form (planner/team only) */
                if (role === 'planner' || role === 'rnbTeam') {
                    html += '<div class="tracking-section tracking-editable" style="margin-top:30px">';
                    html += '<div class="tracking-section-header"><h3 class="tracking-section-title" style="font-size:16px">Add Document</h3><span id="docs-autosave" class="tracking-autosave"></span></div>';
                    html += '<div class="edit-add-row">';
                    html += '<input type="text" id="d-name" class="tracking-input" placeholder="Document name" maxlength="200">';
                    html += '<input type="text" id="d-type" class="tracking-input" placeholder="Type (e.g. Contract)" maxlength="100">';
                    html += '</div>';
                    html += '<div class="edit-add-row" style="margin-bottom:6px;align-items:center">';
                    html += '<label style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:500;letter-spacing:1.5px;color:var(--sage);text-transform:uppercase;white-space:nowrap;margin-right:8px">Upload file</label>';
                    html += '<input type="file" id="d-file" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.webp" style="font-family:Montserrat,sans-serif;font-size:11px;flex:1;color:var(--text-mid)">';
                    html += '<span id="d-file-status" style="font-family:Montserrat,sans-serif;font-size:11px;color:var(--sage);margin-left:8px;white-space:nowrap"></span>';
                    html += '</div>';
                    html += '<div class="edit-add-row" style="align-items:center">';
                    html += '<span style="font-family:Montserrat,sans-serif;font-size:10px;letter-spacing:1px;color:var(--sage-light);text-transform:uppercase;white-space:nowrap;margin-right:8px">— or link —</span>';
                    html += '<input type="url" id="d-url" class="tracking-input" placeholder="Paste URL (https://...)" maxlength="2000" style="flex:1">';
                    html += '</div>';
                    html += '<div class="edit-add-row">';
                    html += '<input type="date" id="d-date" class="tracking-input" maxlength="50">';
                    html += '<button type="button" id="add-btn" class="tracking-add-btn">+ ADD</button>';
                    html += '</div>';
                    html += '</div>';
                }

                el.innerHTML = html;

                /* Wire remove buttons on document list */
                el.querySelectorAll('.doc-row .tracking-remove-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        items.splice(parseInt(this.dataset.index), 1);
                        renderAll();
                        doSave();
                    });
                });

                /* Wire add document form */
                var addBtn = document.getElementById('add-btn');
                if (addBtn) {
                    addBtn.addEventListener('click', function () {
                        var n    = document.getElementById('d-name').value.trim();
                        var u    = document.getElementById('d-url').value.trim();
                        var fileInput = document.getElementById('d-file');
                        var file = fileInput && fileInput.files && fileInput.files[0];
                        if (!n) { alert('Please enter a document name.'); return; }
                        if (!u && !file) { alert('Please paste a URL or choose a file to upload.'); return; }

                        var docDate  = window.toDDMMYYYY(document.getElementById('d-date').value.trim());
                        var docType  = document.getElementById('d-type').value.trim() || 'Document';

                        if (file) {
                            /* Upload file to S3 via Lambda */
                            var statusEl = document.getElementById('d-file-status');
                            statusEl.textContent = 'Uploading…';
                            addBtn.disabled = true;
                            var reader = new FileReader();
                            reader.onload = function (ev) {
                                var dataUrl    = ev.target.result;
                                var base64Data = dataUrl.split(',')[1];
                                var contentType = file.type || 'application/octet-stream';
                                fetch('https://73ucgufya3.execute-api.us-east-2.amazonaws.com/upload-file', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        codeHash:    window.currentCode,
                                        fileName:    file.name,
                                        contentType: contentType,
                                        data:        base64Data
                                    })
                                })
                                .then(function (r) { return r.json(); })
                                .then(function (res) {
                                    addBtn.disabled = false;
                                    if (res && res.ok && res.url) {
                                        statusEl.textContent = '✓ Uploaded';
                                        items.push({ name: n, type: docType, url: res.url, date: docDate });
                                        renderAll();
                                        doSave();
                                        document.getElementById('d-name').value = '';
                                        document.getElementById('d-type').value = '';
                                        document.getElementById('d-url').value  = '';
                                        document.getElementById('d-date').value = '';
                                        fileInput.value = '';
                                        setTimeout(function () { statusEl.textContent = ''; }, 3000);
                                    } else {
                                        statusEl.textContent = 'Upload failed: ' + (res && res.error ? res.error : 'Unknown error');
                                    }
                                })
                                .catch(function (err) {
                                    addBtn.disabled = false;
                                    statusEl.textContent = 'Upload error — check connection.';
                                });
                            };
                            reader.readAsDataURL(file);
                        } else {
                            items.push({ name: n, type: docType, url: u, date: docDate });
                            renderAll();
                            doSave();
                        }
                    });
                    document.getElementById('d-name').addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
                    });
                }

                /* Wire contract attachment remove buttons */
                el.querySelectorAll('.contract-att-remove').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var idx = parseInt(this.dataset.attIndex);
                        if (!isNaN(idx)) {
                            agr.attachments = (agr.attachments || []);
                            agr.attachments.splice(idx, 1);
                            fetch('https://73ucgufya3.execute-api.us-east-2.amazonaws.com/update-client-section', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ codeHash: window.currentCode, section: 'agreement', data: agr })
                            }).then(function (r) { return r.json(); }).then(function (res) {
                                if (res && res.ok) renderAll();
                            });
                        }
                    });
                });

                /* Wire contract attachment add form */
                var attAddBtn = document.getElementById('att-add-btn');
                if (attAddBtn) {
                    attAddBtn.addEventListener('click', function () {
                        var n          = (document.getElementById('att-name').value || '').trim();
                        var caption    = (document.getElementById('att-caption').value || '').trim();
                        var fileInput  = document.getElementById('att-file');
                        var file       = fileInput && fileInput.files && fileInput.files[0];
                        var statusEl   = document.getElementById('att-file-status');
                        if (!n)    { alert('Please enter a label for the attachment.'); return; }
                        if (!file) { alert('Please choose a file to upload.'); return; }
                        statusEl.textContent = 'Uploading\u2026';
                        attAddBtn.disabled = true;
                        var reader = new FileReader();
                        reader.onload = function (ev) {
                            var base64Data  = ev.target.result.split(',')[1];
                            var contentType = file.type || 'application/octet-stream';
                            fetch('https://73ucgufya3.execute-api.us-east-2.amazonaws.com/upload-file', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ codeHash: window.currentCode, fileName: file.name, contentType: contentType, data: base64Data })
                            })
                            .then(function (r) { return r.json(); })
                            .then(function (res) {
                                attAddBtn.disabled = false;
                                if (res && res.ok && res.url) {
                                    agr.attachments = agr.attachments || [];
                                    agr.attachments.push({ name: n, caption: caption, url: res.url, uploadedAt: new Date().toISOString() });
                                    return fetch('https://73ucgufya3.execute-api.us-east-2.amazonaws.com/update-client-section', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ codeHash: window.currentCode, section: 'agreement', data: agr })
                                    }).then(function (r2) { return r2.json(); }).then(function (res2) {
                                        if (res2 && res2.ok) {
                                            statusEl.textContent = '';
                                            document.getElementById('att-name').value = '';
                                            document.getElementById('att-caption').value = '';
                                            fileInput.value = '';
                                            renderAll();
                                        } else {
                                            statusEl.textContent = 'Save failed.';
                                        }
                                    });
                                } else {
                                    statusEl.textContent = 'Upload failed: ' + (res && res.error ? res.error : 'Unknown');
                                }
                            })
                            .catch(function () { attAddBtn.disabled = false; statusEl.textContent = 'Upload error.'; });
                        };
                        reader.readAsDataURL(file);
                    });
                }

                /* Wire couple signature */
                var coupleSigBtn = document.getElementById('couple-sig-btn');
                if (coupleSigBtn) {
                    coupleSigBtn.addEventListener('click', function () {
                        var sigText = (document.getElementById('couple-sig-input').value || '').trim();
                        var statusEl = document.getElementById('couple-sig-status');
                        if (!sigText) { statusEl.textContent = 'Please enter your full name.'; statusEl.className = 'sig-status-msg save-err'; return; }
                        agr.coupleSignature          = sigText;
                        agr.coupleSignedAt           = new Date().toISOString();
                        agr.coupleSignatureUserAgent = navigator.userAgent || '';
                        agr.status = agr.plannerSignature ? 'fully-executed' : 'couple-signed';
                        coupleSigBtn.disabled = true;
                        coupleSigBtn.textContent = 'SAVING...';
                        saveAgreement(statusEl, coupleSigBtn);
                    });
                }

                /* Wire planner signature */
                var plannerSigBtn = document.getElementById('planner-sig-btn');
                if (plannerSigBtn) {
                    plannerSigBtn.addEventListener('click', function () {
                        var sigText = (document.getElementById('planner-sig-input').value || '').trim();
                        var statusEl = document.getElementById('planner-sig-status');
                        if (!sigText) { statusEl.textContent = 'Please enter your full name.'; statusEl.className = 'sig-status-msg save-err'; return; }
                        agr.plannerSignature = sigText;
                        agr.plannerSignedAt  = new Date().toISOString();
                        agr.status = agr.coupleSignature ? 'fully-executed' : 'couple-signed';
                        plannerSigBtn.disabled = true;
                        plannerSigBtn.textContent = 'SAVING...';
                        saveAgreement(statusEl, plannerSigBtn);
                    });
                }

                /* Wire admin reset agreement */
                var resetAgrBtn = document.getElementById('reset-agreement-btn');
                if (resetAgrBtn) {
                    resetAgrBtn.addEventListener('click', function () {
                        var statusEl = document.getElementById('reset-agreement-status');
                        if (!confirm('This will clear all signatures and reset the agreement to pending. Continue?')) return;
                        agr.status = 'pending';
                        agr.coupleSignature = '';
                        agr.coupleSignedAt  = '';
                        agr.plannerSignature = '';
                        agr.plannerSignedAt  = '';
                        resetAgrBtn.disabled = true;
                        resetAgrBtn.textContent = 'RESETTING...';
                        fetch('https://73ucgufya3.execute-api.us-east-2.amazonaws.com/update-client-section', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                codeHash: window.currentCode,
                                section:  'agreement',
                                data:     agr,
                                editLogEntry: {
                                    ts:       new Date().toISOString(),
                                    role:     window.currentRole     || 'rnbTeam',
                                    roleName: window.currentRoleName || 'RNB Team',
                                    action:   'Reset agreement for new contract'
                                }
                            })
                        })
                        .then(function (r) { return r.json(); })
                        .then(function (res) {
                            if (res && res.ok) {
                                renderAll();
                            } else {
                                statusEl.textContent = 'Reset failed: ' + (res.error || 'Unknown');
                                statusEl.className = 'sig-status-msg save-err';
                                resetAgrBtn.disabled = false;
                                resetAgrBtn.textContent = 'RESET AGREEMENT FOR NEW CONTRACT';
                            }
                        })
                        .catch(function (e) {
                            statusEl.textContent = 'Reset failed: ' + e;
                            statusEl.className = 'sig-status-msg save-err';
                            resetAgrBtn.disabled = false;
                            resetAgrBtn.textContent = 'RESET AGREEMENT FOR NEW CONTRACT';
                        });
                    });
                }
            }

            function saveAgreement(statusEl, btn) {
                fetch('https://73ucgufya3.execute-api.us-east-2.amazonaws.com/update-client-section', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        codeHash: window.currentCode,
                        section:  'agreement',
                        data:     agr,
                        editLogEntry: {
                            ts:       new Date().toISOString(),
                            role:     window.currentRole     || 'couple',
                            roleName: window.currentRoleName || 'Client',
                            action:   'Signed agreement'
                        }
                    })
                })
                .then(function (r) { return r.json(); })
                .then(function (res) {
                    if (res && res.ok) {
                        renderAll();
                    } else {
                        statusEl.textContent = 'Save failed: ' + (res.error || 'Unknown');
                        statusEl.className = 'sig-status-msg save-err';
                        if (btn) { btn.disabled = false; btn.textContent = btn.id === 'couple-sig-btn' ? 'SIGN AGREEMENT' : 'COUNTERSIGN'; }
                    }
                })
                .catch(function (e) {
                    statusEl.textContent = 'Save failed: ' + e;
                    statusEl.className = 'sig-status-msg save-err';
                    if (btn) { btn.disabled = false; btn.textContent = btn.id === 'couple-sig-btn' ? 'SIGN AGREEMENT' : 'COUNTERSIGN'; }
                });
            }

            function formatNoteTs(isoTs) {
                if (!isoTs) return '';
                if (window.formatNoteTs) return window.formatNoteTs(isoTs);
                try {
                    var d = new Date(isoTs);
                    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
                } catch (e) { return isoTs; }
            }
        }
        if (window._portalReady) { initDocuments(); } else { window.onPortalReady = initDocuments; }
    </script>
</body>
</html>
