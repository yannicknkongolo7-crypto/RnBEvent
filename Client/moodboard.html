<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Board | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Your Mood Board</h1>
        </div>
    </div>

    <main class="container subpage-content" id="moodboard-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var client  = window.currentClient;
            var mb      = client.moodboard || {};
            var el      = document.getElementById('moodboard-content');
            var html    = '';

            // Description
            if (mb.description) {
                html += '<p class="section-coming" style="margin-bottom:40px;">' + mb.description + '</p>';
            }

            // Colour palette
            if (mb.palette && mb.palette.length > 0) {
                html += '<h2 class="section-title" style="margin-bottom:20px;">Colour Palette</h2>';
                html += '<div class="palette-row">';
                mb.palette.forEach(function (hex) {
                    html += '<div class="palette-swatch" style="background:' + hex + ';" title="' + hex + '"></div>';
                });
                html += '</div>';
            }

            // Images
            if (mb.images && mb.images.length > 0) {
                html += '<h2 class="section-title" style="margin-bottom:20px;">Visual Direction</h2>';
                html += '<div class="moodboard-grid">';
                mb.images.forEach(function (img) {
                    var src     = typeof img === 'string' ? img : img.url;
                    var caption = typeof img === 'object' && img.caption ? img.caption : '';
                    html += '<div>';
                    html += '<img src="' + src + '" alt="' + caption + '" class="moodboard-img" loading="lazy">';
                    if (caption) html += '<p class="gallery-caption">' + caption + '</p>';
                    html += '</div>';
                });
                html += '</div>';
            }

            if (!html) {
                renderComingSoon('moodboard-content', 'Your mood board is being curated. It will be shared here once ready.');
                return;
            }

            el.innerHTML = html;
        });
    </script>
</body>
</html>
