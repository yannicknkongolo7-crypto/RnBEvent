<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK2C6GZWJZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DK2C6GZWJZ');
    </script>
    <title>Tracking Notes | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Tracking Notes</h1>
        </div>
    </div>

    <main class="container subpage-content" id="tracking-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        var NOTES_API = 'https://w8lrwbfe0f.execute-api.us-east-2.amazonaws.com/update-client-notes';

        function initTracking() {
            var client   = window.currentClient;
            var codeHash = window.currentCode;
            var role     = window.currentRole     || 'couple';
            var roleName = window.currentRoleName || 'Client';
            var el       = document.getElementById('tracking-content');
            var notes    = client.trackingNotes || {};

            /* ── Section builder ─────────────────────────── */
            function buildSection(key, title, items, canEdit) {
                var roleLabel = { planner: 'Event Planner', rnbTeam: 'RNB Team', couple: 'Client' };
                var sectionRole = (key === 'plannerTodos') ? 'planner' : (key === 'teamTodos' ? 'rnbTeam' : 'couple');

                var html = '<div class="tracking-section' + (canEdit ? ' tracking-editable' : '') + '" id="section-' + key + '">';
                html += '<h2 class="tracking-section-title">' + title;
                if (!canEdit && role !== sectionRole) {
                    html += '<span class="tracking-section-locked">view only</span>';
                }
                html += '</h2>';

                if (!items.length) {
                    html += '<p class="tracking-empty">No items yet.</p>';
                } else {
                    html += '<ul class="tracking-list' + (canEdit ? ' tracking-list-editable' : '') + '" id="list-' + key + '">';
                    items.forEach(function (item, i) {
                        var statusClass = 'status-' + (item.status || 'pending').toLowerCase().replace(/\s+/g, '-');
                        html += '<li class="tracking-item ' + statusClass + '">';
                        html += '<span class="tracking-bullet"></span>';
                        html += '<span class="tracking-text">' + escHtml(item.text || '') + '</span>';

                        /* author + timestamp meta */
                        if (item.addedBy || item.addedAt) {
                            html += '<span class="tracking-item-meta">';
                            if (item.addedBy) {
                                html += '<span class="tracking-author-badge role-' + escHtml(item.addedBy) + '">' + escHtml(roleLabel[item.addedBy] || item.addedBy) + '</span>';
                            }
                            if (item.addedAt) {
                                html += '<span class="tracking-timestamp">' + escHtml(formatNoteTs(item.addedAt)) + '</span>';
                            }
                            html += '</span>';
                        }

                        if (canEdit) {
                            var sc = statusClass;
                            html += '<select class="tracking-status-select ' + sc + '" data-key="' + key + '" data-index="' + i + '">';
                            ['pending', 'in-progress', 'done', 'not-applicable'].forEach(function (s) {
                                html += '<option value="' + s + '"' + (item.status === s ? ' selected' : '') + '>' + formatStatus(s) + '</option>';
                            });
                            html += '</select>';
                            html += '<button type="button" class="tracking-remove-btn" data-key="' + key + '" data-index="' + i + '" title="Remove">&times;</button>';
                        } else {
                            html += '<span class="tracking-status ' + statusClass + '">' + escHtml(formatStatus(item.status)) + '</span>';
                        }
                        html += '</li>';
                    });
                    html += '</ul>';
                }

                if (canEdit) {
                    html += '<div class="tracking-add-row">';
                    html += '<input type="text" id="new-' + key + '" class="tracking-input" placeholder="Add a new item..." maxlength="500">';
                    html += '<button type="button" class="tracking-add-btn" data-key="' + key + '">+ ADD</button>';
                    html += '</div>';
                    html += '<button type="button" class="tracking-save-btn" id="save-' + key + '-btn">SAVE CHANGES</button>';
                    html += '<p id="save-' + key + '-status" class="tracking-save-status"></p>';
                }

                html += '</div>';
                return html;
            }

            /* ── Build todo arrays (mutable copies) ──────── */
            var plannerTodos = (notes.plannerTodos || []).map(function (i) {
                return { text: i.text, status: i.status || 'pending', addedAt: i.addedAt || '', addedBy: i.addedBy || '' };
            });
            var teamTodos = (notes.teamTodos || []).map(function (i) {
                return { text: i.text, status: i.status || 'pending', addedAt: i.addedAt || '', addedBy: i.addedBy || '' };
            });
            var clientTodos = (notes.clientTodos || []).map(function (i) {
                return { text: i.text, status: i.status || 'pending', addedAt: i.addedAt || '', addedBy: i.addedBy || '' };
            });

            var canEditPlanner = (role === 'planner' || role === 'rnbTeam');
            var canEditTeam    = (role === 'rnbTeam' || role === 'planner');
            var canEditClient  = true; // all roles can edit client todos

            var html = '';
            html += buildSection('plannerTodos', 'Event Planner To-Dos', plannerTodos, canEditPlanner);
            html += buildSection('teamTodos',    'RNB Team To-Dos',      teamTodos,    canEditTeam);
            html += buildSection('clientTodos',  'Client To-Dos',        clientTodos,  canEditClient);

            el.innerHTML = html;

            /* ── Wire up events ──────────────────────────── */
            function wireSection(key, todoArr) {
                var addInput = document.getElementById('new-' + key);
                var addBtn   = el.querySelector('.tracking-add-btn[data-key="' + key + '"]');
                var saveBtn  = document.getElementById('save-' + key + '-btn');

                if (addBtn) addBtn.addEventListener('click', function () { addItem(key, todoArr); });
                if (addInput) addInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') { e.preventDefault(); addItem(key, todoArr); }
                });
                if (saveBtn) saveBtn.addEventListener('click', function () { saveSection(key, todoArr); });
            }

            function attachListEvents(key, todoArr) {
                el.querySelectorAll('.tracking-status-select[data-key="' + key + '"]').forEach(function (sel) {
                    sel.addEventListener('change', function () {
                        var idx = parseInt(this.dataset.index);
                        todoArr[idx].status = this.value;
                        this.className = 'tracking-status-select status-' + this.value;
                    });
                });
                el.querySelectorAll('.tracking-remove-btn[data-key="' + key + '"]').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        todoArr.splice(parseInt(this.dataset.index), 1);
                        refreshList(key, todoArr);
                    });
                });
            }

            function refreshList(key, todoArr) {
                var list = document.getElementById('list-' + key);
                if (!list) {
                    /* list doesn't exist yet because section was empty — re-render whole section */
                    var sectionEl = document.getElementById('section-' + key);
                    if (!sectionEl) return;
                    var titles = { plannerTodos: 'Event Planner To-Dos', teamTodos: 'RNB Team To-Dos', clientTodos: 'Client To-Dos' };
                    var canEdit = (key === 'plannerTodos') ? canEditPlanner : (key === 'teamTodos' ? canEditTeam : canEditClient);
                    sectionEl.outerHTML = buildSection(key, titles[key], todoArr, canEdit);
                    wireSection(key, todoArr);
                    attachListEvents(key, todoArr);
                    return;
                }
                if (!todoArr.length) {
                    list.innerHTML = '<p class="tracking-empty">No items yet.</p>';
                    return;
                }
                var roleLabel = { planner: 'Event Planner', rnbTeam: 'RNB Team', couple: 'Client' };
                var h = '<ul class="tracking-list tracking-list-editable" id="list-' + key + '">';
                todoArr.forEach(function (item, i) {
                    var sc = 'status-' + (item.status || 'pending').replace(/\s+/g, '-');
                    h += '<li class="tracking-item ' + sc + '">';
                    h += '<span class="tracking-bullet"></span>';
                    h += '<span class="tracking-text">' + escHtml(item.text) + '</span>';
                    if (item.addedBy || item.addedAt) {
                        h += '<span class="tracking-item-meta">';
                        if (item.addedBy) h += '<span class="tracking-author-badge role-' + escHtml(item.addedBy) + '">' + escHtml(roleLabel[item.addedBy] || item.addedBy) + '</span>';
                        if (item.addedAt) h += '<span class="tracking-timestamp">' + escHtml(formatNoteTs(item.addedAt)) + '</span>';
                        h += '</span>';
                    }
                    h += '<select class="tracking-status-select ' + sc + '" data-key="' + key + '" data-index="' + i + '">';
                    ['pending', 'in-progress', 'done', 'not-applicable'].forEach(function (s) {
                        h += '<option value="' + s + '"' + (item.status === s ? ' selected' : '') + '>' + formatStatus(s) + '</option>';
                    });
                    h += '</select>';
                    h += '<button type="button" class="tracking-remove-btn" data-key="' + key + '" data-index="' + i + '" title="Remove">&times;</button>';
                    h += '</li>';
                });
                h += '</ul>';
                list.outerHTML = h;
                attachListEvents(key, todoArr);
            }

            function addItem(key, todoArr) {
                var input = document.getElementById('new-' + key);
                var text = (input ? input.value || '' : '').trim();
                if (!text) return;
                todoArr.push({
                    text:    text,
                    status:  'pending',
                    addedAt: new Date().toISOString(),
                    addedBy: role
                });
                if (input) input.value = '';
                refreshList(key, todoArr);
            }

            function saveSection(key, todoArr) {
                var btn    = document.getElementById('save-' + key + '-btn');
                var status = document.getElementById('save-' + key + '-status');
                btn.disabled = true;
                btn.textContent = 'SAVING...';
                status.textContent = '';

                var payload = {
                    codeHash:     codeHash,
                    editLogEntry: {
                        ts:       new Date().toISOString(),
                        role:     role,
                        roleName: roleName,
                        action:   'Updated ' + key
                    }
                };
                payload[key] = todoArr;

                fetch(NOTES_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data && data.ok) {
                        status.textContent = 'Saved!';
                        status.className = 'tracking-save-status save-ok';
                    } else {
                        status.textContent = 'Save failed: ' + (data.error || 'Unknown error');
                        status.className = 'tracking-save-status save-err';
                    }
                })
                .catch(function (e) {
                    status.textContent = 'Save failed: ' + e;
                    status.className = 'tracking-save-status save-err';
                })
                .then(function () {
                    btn.disabled = false;
                    btn.textContent = 'SAVE CHANGES';
                });
            }

            if (canEditPlanner) { wireSection('plannerTodos', plannerTodos); attachListEvents('plannerTodos', plannerTodos); }
            if (canEditTeam)    { wireSection('teamTodos',    teamTodos);    attachListEvents('teamTodos',    teamTodos); }
            wireSection('clientTodos', clientTodos);
            attachListEvents('clientTodos', clientTodos);
        }

        /* Run when portal data is available */
        if (window._portalReady) {
            initTracking();
        } else {
            window.onPortalReady = initTracking;
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatStatus(s) {
            var map = { 'pending': 'Pending', 'in-progress': 'In Progress', 'done': 'Done', 'not-applicable': 'N/A' };
            return map[s] || s;
        }

        function formatNoteTs(isoTs) {
            if (!isoTs) return '';
            if (window.formatNoteTs) return window.formatNoteTs(isoTs);
            try {
                var d = new Date(isoTs);
                return d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
            } catch (e) { return isoTs; }
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatStatus(s) {
            var map = { 'pending': 'Pending', 'in-progress': 'In Progress', 'done': 'Done', 'not-applicable': 'N/A' };
            return map[s] || s;
        }

        /* Run when portal data is available */
        if (window._portalReady) {
            initTracking();
        } else {
            window.onPortalReady = initTracking;
        }
    </script>
</body>
</html>
