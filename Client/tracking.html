<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DK2C6GZWJZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DK2C6GZWJZ');
    </script>
    <title>Tracking Notes | RNB Events Client Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <script>if (!sessionStorage.getItem('rnb_portal_access')) { location.replace('/Client'); }</script>
    <link rel="stylesheet" href="portal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header class="portal-header">
        <a href="/" class="portal-home-link">
            <img src="../RNB Logo Olive.png" alt="RNB Events" class="portal-logo">
        </a>
        <span class="portal-badge">CLIENT PORTAL</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/Client" class="portal-back">&larr; DASHBOARD</a>
            <button class="portal-logout" onclick="portalSignOut()">SIGN OUT</button>
        </div>
    </header>

    <div class="subpage-hero">
        <div class="subpage-hero-inner">
            <p class="portal-hero-label">CLIENT PORTAL</p>
            <h1 class="subpage-hero-title">Tracking Notes</h1>
        </div>
    </div>

    <main class="container subpage-content" id="tracking-content">
        <!-- Rendered by JS -->
    </main>

    <footer class="portal-footer">
        <p>&copy; 2026 RNB Events &mdash; <a href="/">rnbevents716.com</a></p>
        <p class="ynk-credit">Powered by <span class="ynk-brand">YNK Tech</span></p>
    </footer>

    <script src="clients-config.js"></script>
    <script src="portal-page.js"></script>
    <script>
        var NOTES_API = 'https://w8lrwbfe0f.execute-api.us-east-2.amazonaws.com/update-client-notes';

        var STATUS_CYCLE  = ['pending', 'in-progress', 'done', 'not-applicable'];
        var STATUS_LABELS = { 'pending': 'Pending', 'in-progress': 'In Progress', 'done': 'Done ✓', 'not-applicable': 'N/A' };
        var ROLE_LABELS   = { planner: 'Planner', rnbTeam: 'RNB Team', couple: 'Client' };

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function fmtTs(isoTs) {
            if (!isoTs) return '';
            try { return new Date(isoTs).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); }
            catch (e) { return ''; }
        }

        function initTracking() {
            var client   = window.currentClient;
            var codeHash = window.currentCode;
            var role     = window.currentRole     || 'couple';
            var roleName = window.currentRoleName || 'Client';
            var el       = document.getElementById('tracking-content');
            var notes    = client.trackingNotes || {};

            /* Live todo arrays */
            var todos = {
                plannerTodos: (notes.plannerTodos || []).map(clone),
                teamTodos:    (notes.teamTodos    || []).map(clone),
                clientTodos:  (notes.clientTodos  || []).map(clone)
            };

            function clone(i) {
                return { text: String(i.text||''), status: i.status||'pending', addedAt: i.addedAt||'', addedBy: i.addedBy||'' };
            }

            var canEdit = {
                plannerTodos: (role === 'planner' || role === 'rnbTeam'),
                teamTodos:    (role === 'rnbTeam'  || role === 'planner'),
                clientTodos:  true
            };

            var TITLES = {
                plannerTodos: 'Event Planner To-Dos',
                teamTodos:    'RNB Team To-Dos',
                clientTodos:  'Your To-Dos'
            };

            /* ── Debounced auto-save per section ─────────── */
            var saveTimers = {};
            function scheduleSave(key) {
                clearTimeout(saveTimers[key]);
                saveTimers[key] = setTimeout(function () { doSave(key); }, 600);
            }

            function doSave(key) {
                var ind = document.getElementById('ind-' + key);
                if (ind) { ind.textContent = 'Saving…'; ind.className = 'tracking-autosave saving'; }

                var payload = { codeHash: codeHash };
                payload[key] = todos[key];
                payload.editLogEntry = { ts: new Date().toISOString(), role: role, roleName: roleName, action: 'Updated ' + key };

                fetch(NOTES_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (!ind) return;
                    if (data && data.ok) {
                        ind.textContent = 'Saved ✓';
                        ind.className = 'tracking-autosave saved';
                        setTimeout(function () { if (ind) ind.textContent = ''; }, 3000);
                    } else {
                        ind.textContent = '⚠ Save failed';
                        ind.className = 'tracking-autosave error';
                    }
                })
                .catch(function () {
                    if (ind) { ind.textContent = '⚠ No connection'; ind.className = 'tracking-autosave error'; }
                });
            }

            /* ── Render a single item row ─────────────────── */
            function renderItem(key, item, i, editable) {
                var sc  = 'status-' + (item.status || 'pending');
                var lbl = STATUS_LABELS[item.status] || item.status;
                var li  = document.createElement('li');
                li.className = 'tracking-item ' + sc;
                li.dataset.key   = key;
                li.dataset.index = i;

                /* bullet */
                var bullet = document.createElement('span');
                bullet.className = 'tracking-bullet';
                li.appendChild(bullet);

                /* text */
                var txt = document.createElement('span');
                txt.className = 'tracking-text';
                txt.textContent = item.text;
                li.appendChild(txt);

                /* meta (author + time) */
                if (item.addedBy || item.addedAt) {
                    var meta = document.createElement('span');
                    meta.className = 'tracking-item-meta';
                    if (item.addedBy) {
                        var badge = document.createElement('span');
                        badge.className = 'tracking-author-badge role-' + item.addedBy;
                        badge.textContent = ROLE_LABELS[item.addedBy] || item.addedBy;
                        meta.appendChild(badge);
                    }
                    if (item.addedAt) {
                        var ts = document.createElement('span');
                        ts.className = 'tracking-timestamp';
                        ts.textContent = fmtTs(item.addedAt);
                        meta.appendChild(ts);
                    }
                    li.appendChild(meta);
                }

                if (editable) {
                    /* Status pill — tap to cycle */
                    var pill = document.createElement('button');
                    pill.type = 'button';
                    pill.className = 'status-pill ' + sc;
                    pill.textContent = lbl;
                    pill.title = 'Tap to change status';
                    pill.addEventListener('click', function () {
                        var cur = todos[key][i].status;
                        var next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];
                        todos[key][i].status = next;
                        li.className = 'tracking-item status-' + next;
                        bullet.className = 'tracking-bullet';
                        pill.className = 'status-pill status-' + next;
                        pill.textContent = STATUS_LABELS[next];
                        scheduleSave(key);
                    });
                    li.appendChild(pill);

                    /* Remove button */
                    var rmBtn = document.createElement('button');
                    rmBtn.type = 'button';
                    rmBtn.className = 'tracking-remove-btn';
                    rmBtn.title = 'Remove';
                    rmBtn.innerHTML = '&times;';
                    rmBtn.addEventListener('click', function () {
                        todos[key].splice(i, 1);
                        renderList(key);
                        scheduleSave(key);
                    });
                    li.appendChild(rmBtn);
                } else {
                    var statusSpan = document.createElement('span');
                    statusSpan.className = 'tracking-status ' + sc;
                    statusSpan.textContent = lbl;
                    li.appendChild(statusSpan);
                }

                return li;
            }

            /* ── Render item list for a section ──────────── */
            function renderList(key) {
                var listEl = document.getElementById('list-' + key);
                var emptyEl = document.getElementById('empty-' + key);
                if (!listEl) return;
                listEl.innerHTML = '';
                if (!todos[key].length) {
                    if (emptyEl) emptyEl.style.display = '';
                } else {
                    if (emptyEl) emptyEl.style.display = 'none';
                    todos[key].forEach(function (item, i) {
                        listEl.appendChild(renderItem(key, item, i, canEdit[key]));
                    });
                }
            }

            /* ── Build full section HTML ─────────────────── */
            function buildSection(key) {
                var editable = canEdit[key];
                var section  = document.createElement('div');
                section.className = 'tracking-section' + (editable ? ' tracking-editable' : '');
                section.id = 'section-' + key;

                /* Header row */
                var hdr = document.createElement('div');
                hdr.className = 'tracking-section-header';

                var h2 = document.createElement('h2');
                h2.className = 'tracking-section-title';
                h2.textContent = TITLES[key];
                hdr.appendChild(h2);

                if (editable) {
                    var ind = document.createElement('span');
                    ind.id = 'ind-' + key;
                    ind.className = 'tracking-autosave';
                    hdr.appendChild(ind);
                } else {
                    var locked = document.createElement('span');
                    locked.className = 'tracking-section-locked';
                    locked.textContent = 'view only';
                    hdr.appendChild(locked);
                }
                section.appendChild(hdr);

                /* Empty state */
                var empty = document.createElement('p');
                empty.id = 'empty-' + key;
                empty.className = 'tracking-empty';
                empty.textContent = editable ? 'No items yet — add one below.' : 'No items yet.';
                empty.style.display = todos[key].length ? 'none' : '';
                section.appendChild(empty);

                /* List */
                var ul = document.createElement('ul');
                ul.id = 'list-' + key;
                ul.className = 'tracking-list' + (editable ? ' tracking-list-editable' : '');
                section.appendChild(ul);

                /* Add-item row */
                if (editable) {
                    var addRow = document.createElement('div');
                    addRow.className = 'tracking-add-row';

                    var inp = document.createElement('input');
                    inp.type = 'text';
                    inp.id = 'new-' + key;
                    inp.className = 'tracking-input';
                    inp.placeholder = 'Type a note and press Enter…';
                    inp.maxLength = 500;
                    inp.setAttribute('autocomplete', 'off');
                    inp.addEventListener('keydown', function (e) {
                        if (e.key === 'Enter') { e.preventDefault(); addAndSave(key); }
                    });
                    addRow.appendChild(inp);

                    var addBtn = document.createElement('button');
                    addBtn.type = 'button';
                    addBtn.className = 'tracking-add-btn';
                    addBtn.textContent = '+ ADD';
                    addBtn.addEventListener('click', function () { addAndSave(key); });
                    addRow.appendChild(addBtn);

                    section.appendChild(addRow);
                }

                return section;
            }

            function addAndSave(key) {
                var inp  = document.getElementById('new-' + key);
                var text = (inp ? inp.value : '').trim();
                if (!text) { if (inp) inp.focus(); return; }
                todos[key].push({ text: text, status: 'pending', addedAt: new Date().toISOString(), addedBy: role });
                if (inp) inp.value = '';
                renderList(key);
                doSave(key); // immediate save on new item
            }

            /* ── Mount everything ────────────────────────── */
            el.innerHTML = '';
            ['plannerTodos', 'teamTodos', 'clientTodos'].forEach(function (key) {
                var sec = buildSection(key);
                el.appendChild(sec);
                renderList(key);
            });
        }

        /* Run when portal data is available */
        if (window._portalReady) {
            initTracking();
        } else {
            window.onPortalReady = initTracking;
        }
    </script>
</body>
</html>
